<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Metro Designer</title>
<link rel="icon" type="image/png" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ===== TOOLBAR ===== */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
    flex-wrap: wrap;
    z-index: 10;
  }
  #toolbar .app-title {
    font-size: 15px;
    font-weight: 600;
    color: #e94560;
    letter-spacing: 0.5px;
    margin-right: 10px;
    white-space: nowrap;
  }
  .tool-group {
    display: flex;
    gap: 4px;
    align-items: center;
    padding-right: 10px;
    border-right: 1px solid #0f3460;
  }
  .tool-group:last-child { border-right: none; }
  .tool-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border: 1px solid #0f3460;
    border-radius: 6px;
    background: #1a1a2e;
    color: #b0b8cc;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tool-btn:hover { background: #0f3460; color: #fff; }
  .tool-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
  .tool-btn svg { flex-shrink: 0; }

  /* Colour swatch row for line colors */
  #color-swatches {
    display: flex;
    gap: 5px;
    align-items: center;
    flex-wrap: nowrap;
  }
  .color-swatch {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
  }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.selected { border-color: #fff; transform: scale(1.2); }

  /* Line name input shown when a line is selected */
  #line-name-input {
    padding: 4px 8px;
    border: 1px solid #0f3460;
    border-radius: 5px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 12px;
    font-family: inherit;
    width: 120px;
    display: none;
  }

  /* ===== LAYOUT ===== */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ===== CANVAS WRAPPER ===== */
  #canvas-wrapper {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #f8f8f8;
  }
  #canvas {
    display: block;
    cursor: crosshair;
  }
  #canvas.tool-select { cursor: default; }
  #canvas.tool-pan    { cursor: grab; }
  #canvas.tool-pan.panning { cursor: grabbing; }

  /* ===== SIDEBAR ===== */
  #sidebar {
    width: 240px;
    background: #16213e;
    border-left: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  #sidebar-tabs {
    display: flex;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  .sidebar-tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    color: #6c7a9c;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .sidebar-tab.active { color: #e94560; border-bottom-color: #e94560; }
  #sidebar-content { flex: 1; overflow-y: auto; padding: 8px; }
  #sidebar-content::-webkit-scrollbar { width: 4px; }
  #sidebar-content::-webkit-scrollbar-track { background: transparent; }
  #sidebar-content::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

  .sidebar-section-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #6c7a9c;
    margin: 8px 0 4px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    margin-bottom: 3px;
    cursor: pointer;
    transition: background 0.12s;
    font-size: 12px;
  }
  .sidebar-item:hover { background: #0f3460; }
  .sidebar-item.selected { background: #1c3460; }
  .sidebar-item .item-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .sidebar-item .item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-item .item-meta { font-size: 10px; color: #6c7a9c; flex-shrink: 0; }
  .sidebar-item .item-status {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: #0a2040;
    flex-shrink: 0;
  }
  .sidebar-item .item-status.closed { color: #e94560; }
  .sidebar-item .item-status.open { color: #2ecc71; }
  .sidebar-item .item-status.warning { color: #f39c12; }

  /* inline name editor */
  .inline-editor {
    position: absolute;
    padding: 3px 6px;
    border: 1px solid #e94560;
    border-radius: 4px;
    background: rgba(22, 33, 62, 0.95);
    color: #fff;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    outline: none;
    min-width: 80px;
    z-index: 100;
  }

  /* Status bar */
  #statusbar {
    padding: 3px 12px;
    font-size: 10px;
    color: #6c7a9c;
    background: #16213e;
    border-top: 1px solid #0f3460;
    flex-shrink: 0;
    display: flex;
    gap: 16px;
  }
  #statusbar span { white-space: nowrap; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: rgba(22,33,62,0.95);
    color: #e0e0e0;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 5px;
    border: 1px solid #0f3460;
    pointer-events: none;
    display: none;
    z-index: 200;
  }

  /* Warning badge */
  .warn-badge {
    display: inline-block;
    background: #f39c12;
    color: #000;
    font-size: 9px;
    font-weight: 700;
    border-radius: 3px;
    padding: 0 4px;
    margin-left: 4px;
  }

  /* Splash screen */
  #splash-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
    justify-content: center;
    background: #0b1020;
    z-index: 1000;
    opacity: 1;
    visibility: visible;
    transition: opacity 0.7s ease, visibility 0.7s ease;
  }
  #splash-screen .splash-title {
    color: #f2f4fb;
    font-size: clamp(24px, 4vw, 42px);
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
  }
  #splash-screen.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  #splash-screen img {
    width: min(88vw, 860px);
    max-height: 82vh;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }
  #splash-screen .splash-skip {
    position: absolute;
    right: 16px;
    bottom: 14px;
    color: rgba(255, 255, 255, 0.85);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* Start menu shown after splash */
  #start-menu {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(9, 13, 25, 0.86);
    backdrop-filter: blur(8px);
    z-index: 980;
    opacity: 1;
    visibility: visible;
    transition: opacity 0.25s ease, visibility 0.25s ease;
  }
  #start-menu.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }
  #start-menu .menu-card {
    width: min(90vw, 520px);
    background: linear-gradient(165deg, #16213e 0%, #111a31 100%);
    border: 1px solid #253963;
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    padding: 18px;
  }
  #start-menu h1 {
    font-size: 22px;
    color: #f2f4fb;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }
  #start-menu p {
    font-size: 13px;
    color: #9db0d9;
    margin-bottom: 14px;
  }
  #save-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 44vh;
    overflow-y: auto;
    padding-right: 2px;
    margin-bottom: 12px;
  }
  .save-item {
    width: 100%;
    border: 1px solid #234174;
    border-radius: 10px;
    background: #0f1a31;
    color: #dfe8ff;
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
  }
  .save-item:hover {
    background: #112446;
    border-color: #2f64b7;
    transform: translateY(-1px);
  }
  .save-item-main {
    flex: 1;
    border: 0;
    background: transparent;
    color: inherit;
    text-align: left;
    cursor: pointer;
    padding: 2px 4px;
  }
  .save-item .save-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .save-item .save-meta {
    font-size: 11px;
    color: #9ab1dd;
  }
  .save-item-actions {
    display: flex;
    gap: 6px;
  }
  .save-mini-btn {
    border: 1px solid #355d9f;
    border-radius: 7px;
    background: #1c335e;
    color: #dce8ff;
    font-size: 11px;
    padding: 5px 8px;
    cursor: pointer;
  }
  .save-mini-btn.delete {
    border-color: #7d2f41;
    background: #4b1f2a;
    color: #ffd8de;
  }
  #start-menu .menu-actions {
    display: flex;
    gap: 8px;
  }
  #start-menu .menu-btn {
    border: 1px solid #2a4a81;
    border-radius: 9px;
    background: #162a4b;
    color: #eaf1ff;
    padding: 8px 12px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
  }
  #start-menu .menu-btn.primary {
    background: #e94560;
    border-color: #e94560;
    color: #fff;
  }
  #save-empty {
    border: 1px dashed #2e4d82;
    border-radius: 10px;
    padding: 12px;
    color: #9bb0d8;
    font-size: 12px;
  }
</style>
</head>
<body>

<div id="splash-screen" aria-label="App splash screen">
  <div class="splash-title">Metro Designer</div>
  <img src="intro.gif" alt="Metro Designer intro animation">
  <div class="splash-skip">Loading...</div>
</div>

<div id="start-menu" class="hidden" aria-label="Start menu">
  <div class="menu-card">
    <h1>Metro Designer</h1>
    <p>Select a saved metro or create a new one.</p>
    <div id="save-list"></div>
    <div id="save-empty" style="display:none">No saved metros yet. Create your first metro to get started.</div>
    <div class="menu-actions">
      <button class="menu-btn primary" id="btn-new-metro" type="button">Create New Metro</button>
      <button class="menu-btn" id="btn-refresh-saves" type="button">Refresh</button>
    </div>
  </div>
</div>

<!-- ===== TOOLBAR ===== -->
<div id="toolbar">
  <span class="app-title">🚇 Metro Designer</span>

  <div class="tool-group">
    <button class="tool-btn active" id="btn-select" onclick="setTool('select')" title="Select / Move (V)">
      <svg width="13" height="13" viewBox="0 0 13 13"><path d="M1 1l4 10 2-4 4-2z" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
      Select
    </button>
  </div>

  <div class="tool-group">
    <button class="tool-btn" id="btn-station" onclick="setTool('station')" title="Add Station (S)">
      <svg width="13" height="13" viewBox="0 0 13 13"><circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.4" fill="none"/><circle cx="6.5" cy="6.5" r="1.5" fill="currentColor"/></svg>
      Station
    </button>
    <button class="tool-btn" id="btn-close-station" onclick="setTool('close-station')" title="Toggle Station Open/Closed (C)">
      <svg width="13" height="13" viewBox="0 0 13 13"><circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.4" fill="none"/><line x1="4" y1="4" x2="9" y2="9" stroke="currentColor" stroke-width="1.4"/><line x1="9" y1="4" x2="4" y2="9" stroke="currentColor" stroke-width="1.4"/></svg>
      Close/Open
    </button>
  </div>

  <div class="tool-group" style="flex-wrap:wrap; gap:6px;">
    <button class="tool-btn" id="btn-connection" onclick="setTool('connection')" title="Draw Connection (L)">
      <svg width="13" height="13" viewBox="0 0 13 13"><line x1="2" y1="11" x2="11" y2="2" stroke="currentColor" stroke-width="1.5"/><circle cx="2" cy="11" r="2" fill="currentColor"/><circle cx="11" cy="2" r="2" fill="currentColor"/></svg>
      Line
    </button>
    <div id="color-swatches"></div>
    <input id="line-name-input" type="text" placeholder="Line name…" oninput="onLineNameInput(this.value)" />
  </div>

  <div class="tool-group">
    <button class="tool-btn" id="btn-add-train" onclick="addTrainToSelectedLine()" title="Add Train to selected line (T)">
      <svg width="13" height="13" viewBox="0 0 13 13"><rect x="1" y="4" width="11" height="5" rx="1.5" stroke="currentColor" stroke-width="1.2" fill="none"/><circle cx="3.5" cy="9.5" r="1" fill="currentColor"/><circle cx="9.5" cy="9.5" r="1" fill="currentColor"/></svg>
      Add Train
    </button>
  </div>

  <div class="tool-group">
    <button class="tool-btn" onclick="resetView()" title="Reset zoom and pan">
      <svg width="13" height="13" viewBox="0 0 13 13"><path d="M1.5 6.5a5 5 0 1 0 1-3L1 3" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>
      Reset View
    </button>
    <button class="tool-btn" onclick="clearAll()" title="Clear all">
      <svg width="13" height="13" viewBox="0 0 13 13"><path d="M3 3l7 7M10 3l-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Clear
    </button>
  </div>

  <div class="tool-group">
    <button class="tool-btn" onclick="returnToMenu()" title="Back to menu">
      <svg width="13" height="13" viewBox="0 0 13 13"><path d="M8.5 2L4 6.5 8.5 11" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M11 6.5H4.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      Menu
    </button>
  </div>
</div>

<!-- ===== MAIN AREA ===== -->
<div id="main">
  <div id="canvas-wrapper">
    <canvas id="canvas"></canvas>
  </div>

  <!-- ===== SIDEBAR ===== -->
  <div id="sidebar">
    <div id="sidebar-tabs">
      <div class="sidebar-tab active" onclick="switchTab('lines')" id="tab-lines">Lines</div>
      <div class="sidebar-tab" onclick="switchTab('stations')" id="tab-stations">Stations</div>

    <div id="sidebar-content">
      <div id="sidebar-lines"></div>
      <div id="sidebar-stations" style="display:none"></div>

<!-- ===== STATUS BAR ===== -->
<div id="statusbar">
  <span id="status-tool">Tool: Select</span>
  <span id="status-zoom">Zoom: 100%</span>
  <span id="status-coords">X: 0  Y: 0</span>
  <span id="status-info"></span>
</div>

<div id="tooltip"></div>

<!-- ===== MAIN SCRIPT ===== -->
<script>
'use strict';

// =====================================================================
// CONSTANTS
// =====================================================================
const LINE_COLORS = [
  { id:'red',    hex:'#E63946', name:'Red'    },
  { id:'blue',   hex:'#2196F3', name:'Blue'   },
  { id:'green',  hex:'#4CAF50', name:'Green'  },
  { id:'yellow', hex:'#FFD700', name:'Yellow' },
  { id:'purple', hex:'#9C27B0', name:'Purple' },
  { id:'orange', hex:'#FF6D00', name:'Orange' },
  { id:'teal',   hex:'#009688', name:'Teal'   },
  { id:'pink',   hex:'#E91E63', name:'Pink'   },
  { id:'brown',  hex:'#795548', name:'Brown'  },
  { id:'cyan',   hex:'#00BCD4', name:'Cyan'   },
];

const TRAIN_SPEED    = 90;   // pixels per second
const STOP_DURATION  = 2000; // ms waiting at open station
const TRAIN_W        = 18;   // train rect width
const TRAIN_H        = 9;    // train rect height
const STATION_R      = 7;    // normal station radius
const INTERCHANGE_R  = 11;   // interchange station radius
const SNAP_DIST      = 20;   // px distance to snap to existing station
const GRID_SPACING   = 40;   // dot grid spacing
const SAVE_INDEX_KEY = 'metroDesignerSavesV1';
const LEGACY_SAVE_KEY = 'metroDesignerState';
const SAVE_NAME_MAX_LEN = 20;

// Valid snap angles (degrees)
const SNAP_ANGLES = [0, 45, 90, 135, 180, 225, 270, 315];

// =====================================================================
// STATE
// =====================================================================
const state = {
  stations: [],    // { id, x, y, name, closed, lineIds:Set }
  lines:    [],    // { id, name, colorId, stationIds:[], trains:[] }

  nextStationId: 1,
  nextLineId:    1,
  nextTrainId:   1,

  // Viewport
  panX: 0, panY: 0,
  zoom: 1,

  // Active tool & selection
  tool:          'select',
  activeColorId: 'red',
  selectedId:    null,  // { type:'station'|'line'|'train', id }

  // In-progress freehand line drawing
  isDrawingLine: false,
  freehandPoints: [],  // raw world points sampled during drag
  freehandDots:   [],  // grid-snapped, route-valid dot sequence (live)

  // Preview for station tool hover
  previewPt:   null,

  // Dragging (select tool)
  dragging:    null,  // { stationId, startX, startY, dx, dy }
  isPanning:   false,
  panStartX:   0, panStartY: 0,
  panStartPanX:0, panStartPanY:0,

  // Animation
  lastTime:    null,

  // Sidebar tab
  sidebarTab: 'lines',
};

let activeSaveId = null;

// =====================================================================
// ID HELPERS
// =====================================================================
function sid() { return state.nextStationId++; }
function lid() { return state.nextLineId++; }
function tid() { return state.nextTrainId++; }

function getStation(id) { return state.stations.find(s => s.id === id); }
function getLine(id)    { return state.lines.find(l => l.id === id); }

function getStationColorCount(station) {
  const colors = new Set();
  for (const lineId of station.lineIds) {
    const colorId = getLine(lineId)?.colorId;
    if (colorId) colors.add(colorId);
  }
  return colors.size;
}

// =====================================================================
// CANVAS SETUP
// =====================================================================
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const wrapper = document.getElementById('canvas-wrapper');

function resizeCanvas() {
  canvas.width  = wrapper.clientWidth;
  canvas.height = wrapper.clientHeight;
}
window.addEventListener('resize', () => { resizeCanvas(); });
resizeCanvas();

// Coordinate transforms
function worldToScreen(wx, wy) {
  return {
    x: wx * state.zoom + state.panX,
    y: wy * state.zoom + state.panY,
  };
}
function screenToWorld(sx, sy) {
  return {
    x: (sx - state.panX) / state.zoom,
    y: (sy - state.panY) / state.zoom,
  };
}

// =====================================================================
// ANGLE SNAPPING
// =====================================================================
// SNAPPING HELPERS
// =====================================================================

/**
 * Route from grid dot a to grid dot b through valid 45° steps.
 * Each step is either purely horizontal, purely vertical, or exactly 45°.
 * Returns an array of grid dots including both a and b.
 */
function routeDots(a, b) {
  const result = [{ x: a.x, y: a.y }];
  const GS = GRID_SPACING;
  let cx = a.x, cy = a.y;
  let gdx = Math.round((b.x - cx) / GS);
  let gdy = Math.round((b.y - cy) / GS);
  // Walk diagonally first, then straight — produces valid 45° steps
  while (gdx !== 0 || gdy !== 0) {
    const sx = gdx === 0 ? 0 : (gdx > 0 ? 1 : -1);
    const sy = gdy === 0 ? 0 : (gdy > 0 ? 1 : -1);
    cx  += sx * GS;
    cy  += sy * GS;
    gdx -= sx;
    gdy -= sy;
    result.push({ x: cx, y: cy });
  }
  return result;
}

/**
 * Remove collinear intermediate dots — dots where the direction coming in
 * equals the direction going out can be dropped without changing the shape.
 */
function simplifyDots(dots) {
  if (dots.length <= 2) return dots;
  const out = [dots[0]];
  for (let i = 1; i < dots.length - 1; i++) {
    const prev = out[out.length - 1];
    const curr = dots[i];
    const next = dots[i + 1];
    const d1x = Math.sign(curr.x - prev.x), d1y = Math.sign(curr.y - prev.y);
    const d2x = Math.sign(next.x - curr.x), d2y = Math.sign(next.y - curr.y);
    if (d1x !== d2x || d1y !== d2y) out.push(curr);
  }
  out.push(dots[dots.length - 1]);
  return out;
}

/**
 * Distance from point p to line segment ab.
 */
function pointToSegmentDistance(p, a, b) {
  const dx = b.x - a.x;
  const dy = b.y - a.y;
  if (dx === 0 && dy === 0) return Math.hypot(p.x - a.x, p.y - a.y);
  const t = Math.max(0, Math.min(1, ((p.x - a.x) * dx + (p.y - a.y) * dy) / (dx * dx + dy * dy)));
  const cx = a.x + t * dx;
  const cy = a.y + t * dy;
  return Math.hypot(p.x - cx, p.y - cy);
}

/**
 * Ramer-Douglas-Peucker simplification to keep drawn intent but remove jitter.
 */
function rdpSimplify(points, epsilon) {
  if (points.length <= 2) return points.slice();
  const first = points[0];
  const last = points[points.length - 1];

  let maxDist = -1;
  let index = -1;
  for (let i = 1; i < points.length - 1; i++) {
    const d = pointToSegmentDistance(points[i], first, last);
    if (d > maxDist) {
      maxDist = d;
      index = i;
    }
  }

  if (maxDist <= epsilon) return [first, last];

  const left = rdpSimplify(points.slice(0, index + 1), epsilon);
  const right = rdpSimplify(points.slice(index), epsilon);
  return [...left.slice(0, -1), ...right];
}

/**
 * Build a grid-snapped freehand path that follows the drawn gesture but stays
 * on grid dots/steps.
 */
function buildDotSequence(rawPoints) {
  if (rawPoints.length === 0) return [];
  // No simplification: keep the full drawn gesture and only snap it to grid.
  const waypoints = [];
  for (const p of rawPoints) {
    const g = snapToGrid(p.x, p.y);
    const prev = waypoints[waypoints.length - 1];
    if (!prev || prev.x !== g.x || prev.y !== g.y) waypoints.push(g);
  }

  if (waypoints.length <= 2) return waypoints;

  // Rebuild as valid grid steps (horizontal/vertical/45deg).
  const dots = [waypoints[0]];
  for (let i = 1; i < waypoints.length; i++) {
    const steps = routeDots(waypoints[i - 1], waypoints[i]);
    for (let j = 1; j < steps.length; j++) dots.push(steps[j]);
  }

  return dots;
}

/** Snap world coordinates to the nearest grid dot. */
function snapToGrid(wx, wy) {
  return {
    x: Math.round(wx / GRID_SPACING) * GRID_SPACING,
    y: Math.round(wy / GRID_SPACING) * GRID_SPACING,
  };
}

/**
 * Given a start world point and a raw end world point, return a new
 * end point snapped to the nearest 45-degree angle from start.
 * The distance from start to snapped end equals the projection of
 * the raw vector onto the snapped direction.
 */
function snapAngle(fromX, fromY, toX, toY) {
  const dx = toX - fromX;
  const dy = toY - fromY;
  const dist = Math.hypot(dx, dy);
  if (dist < 1) return { x: toX, y: toY };

  const angleDeg = Math.atan2(dy, dx) * 180 / Math.PI;
  // Find nearest snap angle
  let best = SNAP_ANGLES[0], bestDiff = Infinity;
  for (const a of SNAP_ANGLES) {
    let diff = Math.abs(angleDeg - a);
    if (diff > 180) diff = 360 - diff;
    if (diff < bestDiff) { bestDiff = diff; best = a; }
  }
  const rad = best * Math.PI / 180;
  // Project distance onto snapped direction
  const proj = dx * Math.cos(rad) + dy * Math.sin(rad);
  const d = Math.abs(proj);
  return {
    x: fromX + Math.cos(rad) * d,
    y: fromY + Math.sin(rad) * d,
  };
}
