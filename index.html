<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metro Designer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* ===== TOOLBAR ===== */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    background: #16213e;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
    flex-wrap: wrap;
    z-index: 10;
  }
  #toolbar .app-title {
    font-size: 15px;
    font-weight: 600;
    color: #e94560;
    letter-spacing: 0.5px;
    margin-right: 10px;
    white-space: nowrap;
  }
  .tool-group {
    display: flex;
    gap: 4px;
    align-items: center;
    padding-right: 10px;
    border-right: 1px solid #0f3460;
  }
  .tool-group:last-child { border-right: none; }
  .tool-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    border: 1px solid #0f3460;
    border-radius: 6px;
    background: #1a1a2e;
    color: #b0b8cc;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tool-btn:hover { background: #0f3460; color: #fff; }
  .tool-btn.active { background: #e94560; border-color: #e94560; color: #fff; }
  .tool-btn svg { flex-shrink: 0; }

  /* Colour swatch row for line colors */
  #color-swatches {
    display: flex;
    gap: 5px;
    align-items: center;
    flex-wrap: nowrap;
  }
  .color-swatch {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
  }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.selected { border-color: #fff; transform: scale(1.2); }

  /* Line name input shown when a line is selected */
  #line-name-input {
    padding: 4px 8px;
    border: 1px solid #0f3460;
    border-radius: 5px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 12px;
    font-family: inherit;
    width: 120px;
    display: none;
  }

  /* ===== LAYOUT ===== */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ===== CANVAS WRAPPER ===== */
  #canvas-wrapper {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #f8f8f8;
  }
  #canvas {
    display: block;
    cursor: crosshair;
  }
  #canvas.tool-select { cursor: default; }
  #canvas.tool-pan    { cursor: grab; }
  #canvas.tool-pan.panning { cursor: grabbing; }

  /* ===== SIDEBAR ===== */
  #sidebar {
    width: 240px;
    background: #16213e;
    border-left: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  #sidebar-tabs {
    display: flex;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  .sidebar-tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    color: #6c7a9c;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .sidebar-tab.active { color: #e94560; border-bottom-color: #e94560; }
  #sidebar-content { flex: 1; overflow-y: auto; padding: 8px; }
  #sidebar-content::-webkit-scrollbar { width: 4px; }
  #sidebar-content::-webkit-scrollbar-track { background: transparent; }
  #sidebar-content::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

  .sidebar-section-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #6c7a9c;
    margin: 8px 0 4px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    margin-bottom: 3px;
    cursor: pointer;
    transition: background 0.12s;
    font-size: 12px;
  }
  .sidebar-item:hover { background: #0f3460; }
  .sidebar-item.selected { background: #1c3460; }
  .sidebar-item .item-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .sidebar-item .item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-item .item-meta { font-size: 10px; color: #6c7a9c; flex-shrink: 0; }
  .sidebar-item .item-status {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: #0a2040;
    flex-shrink: 0;
  }
  .sidebar-item .item-status.closed { color: #e94560; }
  .sidebar-item .item-status.open { color: #2ecc71; }
  .sidebar-item .item-status.warning { color: #f39c12; }

  /* inline name editor */
  .inline-editor {
    position: absolute;
    padding: 3px 6px;
    border: 1px solid #e94560;
    border-radius: 4px;
    background: rgba(22, 33, 62, 0.95);
    color: #fff;
    font-size: 12px;
    font-family: 'Inter', sans-serif;
    outline: none;
    min-width: 80px;
    z-index: 100;
  }

  /* Status bar */
  #statusbar {
    padding: 3px 12px;
    font-size: 10px;
    color: #6c7a9c;
    background: #16213e;
    border-top: 1px solid #0f3460;
    flex-shrink: 0;
    display: flex;
    gap: 16px;
  }
  #statusbar span { white-space: nowrap; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    background: rgba(22,33,62,0.95);
    color: #e0e0e0;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 5px;
    border: 1px solid #0f3460;
    pointer-events: none;
    display: none;
    z-index: 200;
  }

  /* Warning badge */
  .warn-badge {
    display: inline-block;
    background: #f39c12;
    color: #000;
    font-size: 9px;
    font-weight: 700;
    border-radius: 3px;
    padding: 0 4px;
    margin-left: 4px;
  }
</style>
</head>

<!-- ===== TOOLBAR ===== -->
<div id="toolbar">
  <span class="app-title">🚇 Metro Designer</span>

  <div class="tool-group">
    <button class="tool-btn active" id="btn-select" onclick="setTool('select')" title="Select / Move (V)">

      Select
    </button>
  </div>

  <div class="tool-group">
    <button class="tool-btn" id="btn-station" onclick="setTool('station')" title="Add Station (S)">
      <svg width="13" height="13" viewBox="0 0 13 13"><circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.4" fill="none"/><circle cx="6.5" cy="6.5" r="1.5" fill="currentColor"/></svg>
      Station
    </button>
    <button class="tool-btn" id="btn-close-station" onclick="setTool('close-station')" title="Toggle Station Open/Closed (C)">
      <svg width="13" height="13" viewBox="0 0 13 13"><circle cx="6.5" cy="6.5" r="4" stroke="currentColor" stroke-width="1.4" fill="none"/><line x1="4" y1="4" x2="9" y2="9" stroke="currentColor" stroke-width="1.4"/><line x1="9" y1="4" x2="4" y2="9" stroke="currentColor" stroke-width="1.4"/></svg>
      Close/Open
    </button>
  </div>

  <div class="tool-group" style="flex-wrap:wrap; gap:6px;">
    <button class="tool-btn" id="btn-connection" onclick="setTool('connection')" title="Draw Connection (L)">
      <svg width="13" height="13" viewBox="0 0 13 13"><line x1="2" y1="11" x2="11" y2="2" stroke="currentColor" stroke-width="1.5"/><circle cx="2" cy="11" r="2" fill="currentColor"/><circle cx="11" cy="2" r="2" fill="currentColor"/></svg>
      Line
    </button>
    <div id="color-swatches"></div>
    <input id="line-name-input" type="text" placeholder="Line name…" oninput="onLineNameInput(this.value)" />
  </div>

  <div class="tool-group">
    <button class="tool-btn" id="btn-add-train" onclick="addTrainToSelectedLine()" title="Add Train to selected line (T)">
      <svg width="13" height="13" viewBox="0 0 13 13"><rect x="1" y="4" width="11" height="5" rx="1.5" stroke="currentColor" stroke-width="1.2" fill="none"/><circle cx="3.5" cy="9.5" r="1" fill="currentColor"/><circle cx="9.5" cy="9.5" r="1" fill="currentColor"/></svg>
      Add Train
    </button>
  </div>

  <div class="tool-group">
    <button class="tool-btn" onclick="resetView()" title="Reset zoom and pan">
      <svg width="13" height="13" viewBox="0 0 13 13"><path d="M1.5 6.5a5 5 0 1 0 1-3L1 3" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/></svg>
      Reset View
    </button>

      Clear
    </button>
  </div>

<!-- ===== MAIN AREA ===== -->
<div id="main">
  <div id="canvas-wrapper">
    <canvas id="canvas"></canvas>
  </div>

    <div id="sidebar-tabs">
      <div class="sidebar-tab active" onclick="switchTab('lines')" id="tab-lines">Lines</div>
      <div class="sidebar-tab" onclick="switchTab('stations')" id="tab-stations">Stations</div>
    </div>
    <div id="sidebar-content">
      <div id="sidebar-lines"></div>
      <div id="sidebar-stations" style="display:none"></div>
    </div>
  </div>

<!-- ===== STATUS BAR ===== -->
<div id="statusbar">
  <span id="status-tool">Tool: Select</span>
  <span id="status-zoom">Zoom: 100%</span>
  <span id="status-coords">X: 0  Y: 0</span>
  <span id="status-info"></span>
</div>

<div id="tooltip"></div>

<script>
'use strict';

// =====================================================================
// CONSTANTS
// =====================================================================
const LINE_COLORS = [
  { id:'red',    hex:'#E63946', name:'Red'    },
  { id:'blue',   hex:'#2196F3', name:'Blue'   },
  { id:'green',  hex:'#4CAF50', name:'Green'  },
  { id:'yellow', hex:'#FFD700', name:'Yellow' },
  { id:'purple', hex:'#9C27B0', name:'Purple' },
  { id:'orange', hex:'#FF6D00', name:'Orange' },
  { id:'teal',   hex:'#009688', name:'Teal'   },
  { id:'pink',   hex:'#E91E63', name:'Pink'   },
  { id:'brown',  hex:'#795548', name:'Brown'  },
  { id:'cyan',   hex:'#00BCD4', name:'Cyan'   },
];

const TRAIN_SPEED    = 90;   // pixels per second
const STOP_DURATION  = 2000; // ms waiting at open station
const TRAIN_W        = 18;   // train rect width
const TRAIN_H        = 9;    // train rect height
const STATION_R      = 7;    // normal station radius
const INTERCHANGE_R  = 11;   // interchange station radius
const SNAP_DIST      = 20;   // px distance to snap to existing station
const GRID_SPACING   = 40;   // dot grid spacing

// Valid snap angles (degrees)
const SNAP_ANGLES = [0, 45, 90, 135, 180, 225, 270, 315];

// =====================================================================
// STATE
// =====================================================================
const state = {
  stations: [],    // { id, x, y, name, closed, lineIds:Set }
  lines:    [],    // { id, name, colorId, stationIds:[], trains:[] }

  nextStationId: 1,
  nextLineId:    1,
  nextTrainId:   1,

  // Viewport
  panX: 0, panY: 0,
  zoom: 1,

  // Active tool & selection
  tool:          'select',
  activeColorId: 'red',
  selectedId:    null,  // { type:'station'|'line'|'train', id }

  // In-progress freehand line drawing
  isDrawingLine: false,
  freehandPoints: [],  // raw world points sampled during drag
  freehandDots:   [],  // grid-snapped, route-valid dot sequence (live)

  // Preview for station tool hover
  previewPt:   null,

  // Dragging (select tool)
  dragging:    null,  // { stationId, startX, startY, dx, dy }
  isPanning:   false,
  panStartX:   0, panStartY: 0,
  panStartPanX:0, panStartPanY:0,

  // Animation
  lastTime:    null,

  // Sidebar tab
  sidebarTab: 'lines',
};

// =====================================================================
// ID HELPERS
// =====================================================================
function sid() { return state.nextStationId++; }
function lid() { return state.nextLineId++; }
function tid() { return state.nextTrainId++; }

function getStation(id) { return state.stations.find(s => s.id === id); }
function getLine(id)    { return state.lines.find(l => l.id === id); }

// =====================================================================
// CANVAS SETUP
// =====================================================================
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const wrapper = document.getElementById('canvas-wrapper');

function resizeCanvas() {
  canvas.width  = wrapper.clientWidth;
  canvas.height = wrapper.clientHeight;
}
window.addEventListener('resize', () => { resizeCanvas(); });
resizeCanvas();

// Coordinate transforms
function worldToScreen(wx, wy) {
  return {
    x: wx * state.zoom + state.panX,
    y: wy * state.zoom + state.panY,
  };
}
function screenToWorld(sx, sy) {
  return {
    x: (sx - state.panX) / state.zoom,
    y: (sy - state.panY) / state.zoom,
  };
}

// =====================================================================
// ANGLE SNAPPING
// =====================================================================
// SNAPPING HELPERS
// =====================================================================

/**
 * Route from grid dot a to grid dot b through valid 45° steps.
 * Each step is either purely horizontal, purely vertical, or exactly 45°.
 * Returns an array of grid dots including both a and b.
 */
function routeDots(a, b) {
  const result = [{ x: a.x, y: a.y }];
  const GS = GRID_SPACING;
  let cx = a.x, cy = a.y;
  let gdx = Math.round((b.x - cx) / GS);
  let gdy = Math.round((b.y - cy) / GS);
  // Walk diagonally first, then straight — produces valid 45° steps
  while (gdx !== 0 || gdy !== 0) {
    const sx = gdx === 0 ? 0 : (gdx > 0 ? 1 : -1);
    const sy = gdy === 0 ? 0 : (gdy > 0 ? 1 : -1);
    cx  += sx * GS;
    cy  += sy * GS;
    gdx -= sx;
    gdy -= sy;
    result.push({ x: cx, y: cy });
  }
  return result;
}

/**
 * Given an array of raw world points, build a deduplicated sequence of
 * grid dots connected by valid 45° steps.
 */
function buildDotSequence(rawPoints) {
  const dots = [];
  for (const pt of rawPoints) {
    const g = snapToGrid(pt.x, pt.y);
    if (dots.length === 0) {
      dots.push(g);
      continue;
    }
    const prev = dots[dots.length - 1];
    if (g.x === prev.x && g.y === prev.y) continue; // hasn't moved to a new dot
    // Route from prev to g via valid steps, append all new dots
    const steps = routeDots(prev, g);
    for (let i = 1; i < steps.length; i++) dots.push(steps[i]);
  }
  return dots;
}

/** Snap world coordinates to the nearest grid dot. */
function snapToGrid(wx, wy) {
  return {
    x: Math.round(wx / GRID_SPACING) * GRID_SPACING,
    y: Math.round(wy / GRID_SPACING) * GRID_SPACING,
  };
}

/**
 * Given a start world point and a raw end world point, return a new
 * end point snapped to the nearest 45-degree angle from start.
 * The distance from start to snapped end equals the projection of
 * the raw vector onto the snapped direction.
 */
function snapAngle(fromX, fromY, toX, toY) {
  const dx = toX - fromX;
  const dy = toY - fromY;
  const dist = Math.hypot(dx, dy);
  if (dist < 1) return { x: toX, y: toY };

  const angleDeg = Math.atan2(dy, dx) * 180 / Math.PI;
  // Find nearest snap angle
  let best = SNAP_ANGLES[0], bestDiff = Infinity;
  for (const a of SNAP_ANGLES) {
    let diff = Math.abs(angleDeg - a);
    if (diff > 180) diff = 360 - diff;
    if (diff < bestDiff) { bestDiff = diff; best = a; }
  }
  const rad = best * Math.PI / 180;
  // Project distance onto snapped direction
  const proj = dx * Math.cos(rad) + dy * Math.sin(rad);
  const d = Math.abs(proj);
  return {
    x: fromX + Math.cos(rad) * d,
    y: fromY + Math.sin(rad) * d,
  };
}

// =====================================================================
// BUILD COLOR SWATCHES
// =====================================================================
(function buildSwatches() {
  const container = document.getElementById('color-swatches');
  for (const c of LINE_COLORS) {
    const el = document.createElement('div');
    el.className = 'color-swatch' + (c.id === state.activeColorId ? ' selected' : '');
    el.style.background = c.hex;
    el.title = c.name;
    el.dataset.colorId = c.id;
    el.addEventListener('click', () => {
      state.activeColorId = c.id;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      // If in connection mode and we have a selected line with this color, switch to it
      setTool('connection');
    });
    container.appendChild(el);
  }
})();

function getActiveColor() {
  return LINE_COLORS.find(c => c.id === state.activeColorId) || LINE_COLORS[0];
}

const TOOL_LABELS = {
  select: 'Select / Move',
  station: 'Add Station',
  connection: 'Draw Line — click & drag to sketch, release to straighten',
  'close-station': 'Toggle Station Open/Closed',
};

function setTool(tool) {
  state.tool          = tool;
  state.isDrawingLine = false;
  state.freehandPoints = [];
  state.freehandDots   = [];
  state.previewPt      = null;

  // Update button active states
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  const map = {
    select: 'btn-select', station: 'btn-station', connection: 'btn-connection',
    'close-station': 'btn-close-station',
  };
  if (map[tool]) document.getElementById(map[tool])?.classList.add('active');

  // Show line name input only in connection mode
  document.getElementById('line-name-input').style.display =
    tool === 'connection' ? 'inline-block' : 'none';

  // Update cursor
  canvas.className = '';
  if (tool === 'select') canvas.classList.add('tool-select');

  document.getElementById('status-tool').textContent = 'Tool: ' + (TOOL_LABELS[tool] || tool);
}

// =====================================================================
// LINE & STATION MANAGEMENT
// =====================================================================
function getOrCreateActiveLine() {
  // Find existing line with active color that isn't "completed" (we allow multiple per color, but
  // default to the most recently used line of this color)
  const colorId = state.activeColorId;

  // If something is selected in sidebar, use that line
  if (state.selectedId && state.selectedId.type === 'line') {
    const l = getLine(state.selectedId.id);
    if (l && l.colorId === colorId) return l;
  }

  // Find the line with this color and the most stations (last edited)
  const candidates = state.lines.filter(l => l.colorId === colorId);
  if (candidates.length > 0) return candidates[candidates.length - 1];

  // Create new line
  const color = getActiveColor();
  const newLine = {
    id:         lid(),
    name:       color.name + ' Line',
    colorId:    colorId,
    stationIds: [],
    trains:     [],
  };
  state.lines.push(newLine);
  return newLine;
}

function addStation(wx, wy) {
  // Snap placement to the nearest grid dot
  const g = snapToGrid(wx, wy);
  wx = g.x; wy = g.y;

  // Check if near existing station
  const near = findNearestStation(wx, wy, SNAP_DIST / state.zoom);
  if (near) return near;

  const st = {
    id:      sid(),
    x:       wx,
    y:       wy,
    name:    nextStationName(),
    closed:  false,
    lineIds: new Set(),
  };
  state.stations.push(st);
  scheduleSave();
  return st;
}

function findNearestStation(wx, wy, maxDist) {
  let best = null, bestD = maxDist;
  for (const s of state.stations) {
    const d = Math.hypot(s.x - wx, s.y - wy);
    if (d < bestD) { bestD = d; best = s; }
  }
  return best;
}

/** Connect two stations on a line (order matters for path) */
function connectStations(line, stA, stB) {
  const ids = line.stationIds;

  // If line is empty, add both
  if (ids.length === 0) {
    ids.push(stA.id, stB.id);
    stA.lineIds.add(line.id);
    stB.lineIds.add(line.id);
    spawnInitialTrain(line);
    return;
  }

  // stB already in line?
  const iB = ids.indexOf(stB.id);
  const iA = ids.indexOf(stA.id);

  // Extend head (prepend) or tail (append)
  const head = ids[0];
  const tail = ids[ids.length - 1];

  if (stA.id === tail && iB === -1) {
    // Extend tail: A is tail, B is new
    const oldLastSegIdx = ids.length - 2;
    ids.push(stB.id);
    stB.lineIds.add(line.id);
    stA.lineIds.add(line.id);
    // Fix trains that reversed at old tail — flip them to continue forward
    for (const train of line.trains) {
      if (train.direction === -1 && train.segIdx === oldLastSegIdx) {
        train.direction = 1;
        train.segIdx    = oldLastSegIdx + 1;
        train.progress  = 0;
        train.state     = 'moving';
      }
    }
  } else if (stA.id === head && iB === -1) {
    // Extend head: A is head, B is new
    ids.unshift(stB.id);
    stB.lineIds.add(line.id);
    stA.lineIds.add(line.id);
    // Prepending shifts all segment indices by 1
    for (const train of line.trains) {
      train.segIdx += 1;
    }
  } else if (stB.id === tail && iA === -1) {
    const oldLastSegIdx = ids.length - 2;
    ids.push(stA.id);
    stA.lineIds.add(line.id);
    stB.lineIds.add(line.id);
    // Fix trains that reversed at old tail — flip them to continue forward
    for (const train of line.trains) {
      if (train.direction === -1 && train.segIdx === oldLastSegIdx) {
        train.direction = 1;
        train.segIdx    = oldLastSegIdx + 1;
        train.progress  = 0;
        train.state     = 'moving';
      }
    }
  } else if (stB.id === head && iA === -1) {
    ids.unshift(stA.id);
    stA.lineIds.add(line.id);
    stB.lineIds.add(line.id);
    // Prepending shifts all segment indices by 1
    for (const train of line.trains) {
      train.segIdx += 1;
    }
  } else if (iA !== -1 && iB === -1) {
    // Insert B after A
    ids.splice(iA + 1, 0, stB.id);
    stB.lineIds.add(line.id);
    // Inserting shifts all segment indices at or after insertion point
    for (const train of line.trains) {
      if (train.segIdx >= iA + 1) {
        train.segIdx += 1;
      }
    }
  } else if (iB !== -1 && iA === -1) {
    ids.splice(iB + 1, 0, stA.id);
    stA.lineIds.add(line.id);
    // Inserting shifts all segment indices at or after insertion point
    for (const train of line.trains) {
      if (train.segIdx >= iB + 1) {
        train.segIdx += 1;
      }
    }
  } else {
    // Both already in line — just ensure membership
    stA.lineIds.add(line.id);
    stB.lineIds.add(line.id);
  }

  if (ids.length === 2) spawnInitialTrain(line);
  scheduleSave();
}

// =====================================================================
// TRAIN MANAGEMENT
// =====================================================================
/**
 * Spawn the first train for a line at segment 0, progress 0, going forward.
 */
function spawnInitialTrain(line) {
  if (line.stationIds.length < 2) return;
  if (line.trains.length > 0) return; // already has trains

  const train = makeTrain(line.id, 0, 0.05, 1);
  line.trains.push(train);
}

function makeTrain(lineId, segIdx, progress, direction) {
  return {
    id:            tid(),
    lineId,
    segIdx:        segIdx,   // index of segment (0 = between station[0] and station[1])
    progress:      progress, // 0..1 along segment
    direction:     direction, // +1 forward, -1 backward
    state:         'moving',
    stopRemaining: 0,
    label:         '',       // set after creation
  };
}

/** Add an extra train to a line, running opposite to the first. */
function addTrainToSelectedLine() {
  const sel = state.selectedId;
  if (!sel || sel.type !== 'line') {
    showTooltipMsg('Select a line first, then click Add Train.', 2000);
    return;
  }
  const line = getLine(sel.id);
  if (!line || line.stationIds.length < 2) return;

  const n = line.trains.length;
  if (n === 0) { spawnInitialTrain(line); return; }

  // Same direction as the first train
  const firstDir = line.trains[0].direction;
  const newDir   = firstDir;

  // Place new train roughly in the middle of the path in the opposite direction
  const totalSegs = line.stationIds.length - 1;
  const midSeg    = Math.floor(totalSegs / 2);
  const progress  = 0.5;

  const train = makeTrain(line.id, midSeg, progress, newDir);
  NumberTrains(line);
  line.trains.push(train);
  NumberTrains(line);
  updateSidebar();
  scheduleSave();
}

/** Assign sequential labels to trains on a line. */
function NumberTrains(line) {
  line.trains.forEach((t, i) => { t.label = String(i + 1); });
}

/**
 * Check if a line forms a closed loop.
 * A loop is detected when the first and last stations are the same.
 */
function isLoop(line) {
  const ids = line.stationIds;
  if (ids.length < 3) return false;
  return ids[0] === ids[ids.length - 1];
}

// =====================================================================
// TRAIN ANIMATION
// =====================================================================
function getSegmentLength(line, segIdx) {
  const ids = line.stationIds;
  const loop = isLoop(line);
  
  // For loops, the segment from last to first wraps around
  if (loop && segIdx === ids.length - 1) {
    const a = getStation(ids[ids.length - 1]);
    const b = getStation(ids[0]);
    if (!a || !b) return 1;
    return Math.hypot(b.x - a.x, b.y - a.y) || 1;
  }
  
  if (segIdx < 0 || segIdx >= ids.length - 1) return 1;
  const a = getStation(ids[segIdx]);
  const b = getStation(ids[segIdx + 1]);
  if (!a || !b) return 1;
  return Math.hypot(b.x - a.x, b.y - a.y) || 1;
}

function getTrainPosition(train) {
  const line = getLine(train.lineId);
  if (!line || line.stationIds.length < 2) return null;
  const ids = line.stationIds;
  const loop = isLoop(line);
  
  // For loops, handle wrap segment from last to first
  if (loop && train.segIdx === ids.length - 1) {
    const a = getStation(ids[ids.length - 1]);
    const b = getStation(ids[0]);
    if (!a || !b) return null;
    const p   = train.progress;
    const ang = Math.atan2(b.y - a.y, b.x - a.x);
    return {
      x:   a.x + (b.x - a.x) * p,
      y:   a.y + (b.y - a.y) * p,
      ang: ang + (train.direction === -1 ? Math.PI : 0),
    };
  }
  
  const si = Math.max(0, Math.min(train.segIdx, ids.length - 2));
  const a  = getStation(ids[si]);
  const b  = getStation(ids[si + 1]);
  if (!a || !b) return null;
  const p   = train.progress;
  const ang = Math.atan2(b.y - a.y, b.x - a.x);
  return {
    x:   a.x + (b.x - a.x) * p,
    y:   a.y + (b.y - a.y) * p,
    ang: ang + (train.direction === -1 ? Math.PI : 0),
  };
}

/**
 * Find the effective terminus index in a given direction.
 * If all terminus stations are closed, the train still reverses at the real terminus but skips the stop.
 */
function effectiveTerminusIndex(line, dir) {
  const ids = line.stationIds;
  if (dir === 1) {
    // Forward: last station
    return ids.length - 1;
  } else {
    // Backward: first station
    return 0;
  }
}

/**
 * When a train arrives at stationIndex, decide whether to stop.
 * Returns true if it should stop.
 */
function shouldStop(line, stationIndex) {
  const st = getStation(line.stationIds[stationIndex]);
  return st && !st.closed;
}

function updateTrain(train, dt) {
  const line = getLine(train.lineId);
  if (!line || line.stationIds.length < 2) return;
  const ids = line.stationIds;
  const loop = isLoop(line);

  // DEBUG: Log full station sequence once
  if (!train._logged) {
    train._logged = true;
    const names = ids.map(id => getStation(id)?.name || '?');
    console.log(`Train route (loop=${loop}): [${names.join(' → ')}]`);
    console.log(`Station IDs: [${ids.join(', ')}]`);
  }

  // --- STOPPED STATE ---
  if (train.state === 'stopped') {
    train.stopRemaining -= dt;
    if (train.stopRemaining <= 0) {
      train.state         = 'stopped_done'; // will transition below
      train.stopRemaining = 0;
      // Start moving in current direction
      train.state = 'moving';
    }
    return;
  }

  // --- MOVING STATE ---
  const segLen = getSegmentLength(line, train.segIdx);
  const dp     = (TRAIN_SPEED * dt / 1000) / segLen;

  train.progress += dp * train.direction;

  if (loop) {
    // === LOOP MODE: automatic junction navigation based on momentum ===
    if (train.progress >= 1) {
      const prevIdx = train.segIdx;
      const currentStationId = ids[prevIdx];
      const nextStationId = ids[prevIdx + 1];
      
      // Calculate current travel direction vector for momentum
      const currentSt = getStation(currentStationId);
      const nextSt = getStation(nextStationId);
      if (currentSt && nextSt) {
        train.momentumAngle = Math.atan2(nextSt.y - currentSt.y, nextSt.x - currentSt.x);
      }
      
      train.segIdx++;
      train.progress = 0;
      
      // Wrap from last segment back to segment 0
      if (train.segIdx >= ids.length - 1) {
        train.segIdx = 0;
        delete train.momentumAngle;
      }
      
      // Smart junction: detect if we're at a repeated station (junction)
      const arrivedStationId = ids[train.segIdx];
      
      // Find all occurrences of this station in the path
      const occurrences = [];
      for (let i = 0; i < ids.length - 1; i++) {
        if (ids[i] === arrivedStationId) occurrences.push(i);
      }
      
      // DEBUG: Log junction info
      const stName = getStation(arrivedStationId)?.name || '?';
      if (occurrences.length > 1) {
        const nextNames = occurrences.map(i => getStation(ids[i+1])?.name || '?');
        console.log(`JUNCTION: ${stName} at segIdx=${train.segIdx}, occurrences=[${occurrences}], nextStations=[${nextNames}], momentum=${train.momentumAngle?.toFixed(2)}`);
        console.log(`  prevIdx=${prevIdx}, ids[prevIdx]=${getStation(ids[prevIdx])?.name}, came from: ${prevIdx > 0 ? getStation(ids[prevIdx-1])?.name : 'start'}`);
      }
      
      // If this station appears multiple times, it's a junction
      if (occurrences.length > 1 && train.segIdx < ids.length - 2 && train.momentumAngle !== undefined) {
        const arrivedSt = getStation(arrivedStationId);
        if (arrivedSt) {
          // Find the best next segment based on momentum
          let bestIdx = train.segIdx;
          let bestScore = -2; // Start with worst possible dot product
          
          for (const occIdx of occurrences) {
            if (occIdx >= ids.length - 2) continue; // Skip if no next segment
            
            const candidateNextId = ids[occIdx + 1];
            const candidateNextSt = getStation(candidateNextId);
            if (!candidateNextSt) continue;
            
            // Don't immediately backtrack to where we just came from
            if (prevIdx > 0 && ids[prevIdx - 1] === candidateNextId) continue;
            
            // Calculate angle from junction to candidate next station
            const candidateAngle = Math.atan2(
              candidateNextSt.y - arrivedSt.y,
              candidateNextSt.x - arrivedSt.x
            );
            
            // Score based on momentum alignment (dot product of unit vectors)
            const angleDiff = candidateAngle - train.momentumAngle;
            const score = Math.cos(angleDiff); // 1 = same direction, -1 = opposite
            
            console.log(`  candidate occ=${occIdx} → ${getStation(candidateNextId)?.name}, angle=${candidateAngle.toFixed(2)}, score=${score.toFixed(3)}`);
            
            if (score > bestScore) {
              bestScore = score;
              bestIdx = occIdx;
            }
          }
          
          console.log(`  CHOSE occ=${bestIdx} (was ${train.segIdx})`);
          
          // Use the best path (most aligned with momentum)
          if (bestIdx !== train.segIdx) {
            train.segIdx = bestIdx;
          }
        }
      }
      
      // Check station arrivals
      const arrivedStationIdx = train.segIdx === 0 ? 0 : train.segIdx;
      
      if (shouldStop(line, arrivedStationIdx)) {
        train.state = 'stopped';
        train.stopRemaining = STOP_DURATION;
      }
    }
  } else {
    // === LINEAR MODE: trains reverse at termini ===
    // Arrived at forward end of segment?
    if (train.direction === 1 && train.progress >= 1) {
      const arrivedIdx = train.segIdx + 1;

      if (arrivedIdx >= ids.length - 1) {
        // Reached last station — reverse
        train.segIdx     = ids.length - 2;
        train.progress   = 1.0;
        train.direction  = -1;
        if (shouldStop(line, ids.length - 1)) {
          train.state         = 'stopped';
          train.stopRemaining = STOP_DURATION;
        }
      } else {
        // Move to next segment
        train.segIdx   = arrivedIdx;
        train.progress = 0;
        if (shouldStop(line, arrivedIdx)) {
          train.state         = 'stopped';
          train.stopRemaining = STOP_DURATION;
        }
      }

    } else if (train.direction === -1 && train.progress <= 0) {
      const arrivedIdx = train.segIdx;

      if (arrivedIdx <= 0) {
        // Reached first station — reverse
        train.segIdx    = 0;
        train.progress  = 0.0;
        train.direction = 1;
        if (shouldStop(line, 0)) {
          train.state         = 'stopped';
          train.stopRemaining = STOP_DURATION;
        }
      } else {
        // Move to previous segment
        train.segIdx   = arrivedIdx - 1;
        train.progress = 1.0;
        if (shouldStop(line, arrivedIdx)) {
          train.state         = 'stopped';
          train.stopRemaining = STOP_DURATION;
        }
      }
    }
  }
}

// =====================================================================
// RENDERING
// =====================================================================
function render(timestamp) {
  const dt = state.lastTime ? Math.min(timestamp - state.lastTime, 100) : 16;
  state.lastTime = timestamp;

  // Update all trains
  for (const line of state.lines) {
    for (const train of line.trains) {
      updateTrain(train, dt);
    }
  }

  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // White canvas background
  ctx.fillStyle = '#f8f8f8';
  ctx.fillRect(0, 0, W, H);

  // Save and apply viewport transform
  ctx.save();
  ctx.translate(state.panX, state.panY);
  ctx.scale(state.zoom, state.zoom);

  drawGrid();
  drawConnections();
  drawPreviewLine();
  drawStationPreview();
  drawStations();
  drawTrains();

  ctx.restore();

  requestAnimationFrame(render);
}

// ---- Grid ----
function drawGrid() {
  const invZoom = 1 / state.zoom;
  const ox = -state.panX * invZoom;
  const oy = -state.panY * invZoom;
  const W  = canvas.width  * invZoom;
  const H  = canvas.height * invZoom;

  const sp = GRID_SPACING;
  const startX = Math.floor(ox / sp) * sp;
  const startY = Math.floor(oy / sp) * sp;

  ctx.fillStyle = '#c8cdd8';
  const r = Math.max(1, 1.5 * invZoom);
  for (let x = startX; x < ox + W + sp; x += sp) {
    for (let y = startY; y < oy + H + sp; y += sp) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ---- Connections (metro lines) ----
function drawConnections() {
  for (const line of state.lines) {
    const ids   = line.stationIds;
    const color = LINE_COLORS.find(c => c.id === line.colorId)?.hex || '#888';
    if (ids.length < 2) continue;

    const loop = isLoop(line);

    // Draw line segments
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth   = Math.max(2, 4 / state.zoom);
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.beginPath();
    const first = getStation(ids[0]);
    if (first) ctx.moveTo(first.x, first.y);
    for (let i = 1; i < ids.length; i++) {
      const s = getStation(ids[i]);
      if (s) ctx.lineTo(s.x, s.y);
    }
    
    // For loops, close the path by drawing back to first station
    // (though ids already has duplicate, this ensures visual closure)
    if (loop && first) {
      ctx.lineTo(first.x, first.y);
    }
    
    ctx.stroke();
    ctx.restore();
  }
}

// ---- Ghost dot preview when placing a station ----
function drawStationPreview() {
  if (state.tool !== 'station' || !state.previewPt) return;
  const g = snapToGrid(state.previewPt.x, state.previewPt.y);
  const occupied = findNearestStation(g.x, g.y, 2);

  ctx.save();
  ctx.globalAlpha = 0.65;
  ctx.beginPath();
  ctx.arc(g.x, g.y, STATION_R, 0, Math.PI * 2);
  // Orange ring if a station already sits on this dot, otherwise white dashed ring
  ctx.strokeStyle = occupied ? '#f39c12' : '#333';
  ctx.fillStyle   = occupied ? 'rgba(243,156,18,0.15)' : 'rgba(255,255,255,0.5)';
  ctx.lineWidth   = 2 / state.zoom;
  ctx.setLineDash([4 / state.zoom, 3 / state.zoom]);
  ctx.fill();
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ---- Freehand line preview ----
function drawPreviewLine() {
  if (state.tool !== 'connection') return;

  const color = getActiveColor().hex;

  // While actively drawing — show raw stroke + snapped overlay
  if (state.isDrawingLine && state.freehandPoints.length > 1) {
    // 1. Faint raw freehand stroke (marker feel)
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth   = Math.max(3, 6 / state.zoom);
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.globalAlpha = 0.18;
    ctx.beginPath();
    ctx.moveTo(state.freehandPoints[0].x, state.freehandPoints[0].y);
    for (let i = 1; i < state.freehandPoints.length; i++) {
      ctx.lineTo(state.freehandPoints[i].x, state.freehandPoints[i].y);
    }
    ctx.stroke();
    ctx.restore();

    // 2. Bold snapped path
    const dots = state.freehandDots;
    if (dots.length >= 2) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth   = Math.max(2, 4 / state.zoom);
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      ctx.globalAlpha = 0.75;
      ctx.beginPath();
      ctx.moveTo(dots[0].x, dots[0].y);
      for (let i = 1; i < dots.length; i++) ctx.lineTo(dots[i].x, dots[i].y);
      ctx.stroke();
      ctx.restore();

      // 3. Dot markers at each planned station position
      ctx.save();
      ctx.globalAlpha = 0.9;
      for (let i = 0; i < dots.length; i++) {
        const d = dots[i];
        const isEndpoint = i === 0 || i === dots.length - 1;
        ctx.beginPath();
        ctx.arc(d.x, d.y, isEndpoint ? STATION_R : (STATION_R - 2), 0, Math.PI * 2);
        ctx.fillStyle   = '#fff';
        ctx.strokeStyle = color;
        ctx.lineWidth   = Math.max(1.5, 2.5 / state.zoom);
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    }
  }
}

// ---- Stations ----
function drawStations() {
  // Build name-collision map
  const nameCounts = {};
  for (const s of state.stations) {
    nameCounts[s.name] = (nameCounts[s.name] || 0) + 1;
  }

  for (const station of state.stations) {
    const isInterchange = station.lineIds.size >= 2;
    const r = isInterchange ? INTERCHANGE_R : STATION_R;
    const isSelected = state.selectedId?.type === 'station' && state.selectedId?.id === station.id;
    const isDuplicate = nameCounts[station.name] > 1;

    ctx.save();

    if (station.closed) {
      ctx.globalAlpha = 0.45;
    }

    // Station circle
    ctx.beginPath();
    ctx.arc(station.x, station.y, r, 0, Math.PI * 2);

    if (isInterchange) {
      ctx.fillStyle   = station.closed ? '#aaa' : '#fff';
      ctx.strokeStyle = station.closed ? '#888' : '#222';
      ctx.lineWidth   = Math.max(1.5, 2.5 / state.zoom);
      ctx.fill();
      ctx.stroke();
    } else {
      // Single-line station: fill with line color
      const lineId = [...station.lineIds][0];
      const line   = lineId ? getLine(lineId) : null;
      const color  = line ? (LINE_COLORS.find(c => c.id === line.colorId)?.hex || '#888') : '#888';
      ctx.fillStyle = station.closed ? '#aaa' : color;
      ctx.fill();
      // white outline
      ctx.strokeStyle = '#fff';
      ctx.lineWidth   = Math.max(1, 2 / state.zoom);
      ctx.stroke();
    }

    // Selection ring
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(station.x, station.y, r + 4, 0, Math.PI * 2);
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth   = 2 / state.zoom;
      ctx.stroke();
    }

    // Closed X marker
    if (station.closed) {
      const d = r * 0.55;
      ctx.strokeStyle = '#c0392b';
      ctx.lineWidth   = Math.max(1.2, 2 / state.zoom);
      ctx.beginPath();
      ctx.moveTo(station.x - d, station.y - d);
      ctx.lineTo(station.x + d, station.y + d);
      ctx.moveTo(station.x + d, station.y - d);
      ctx.lineTo(station.x - d, station.y + d);
      ctx.stroke();
    }

    ctx.restore();

    // Station name label
    drawStationLabel(station, r, isDuplicate);
  }
}

function drawStationLabel(station, r, isDuplicate) {
  ctx.save();
  const fontSize = Math.max(9, 11 / state.zoom);
  ctx.font        = `${station.closed ? '300' : '500'} ${fontSize}px Inter, sans-serif`;
  ctx.textAlign   = 'center';
  ctx.textBaseline = 'top';

  // Offset label below station
  const lx = station.x;
  const ly = station.y + r + 3 / state.zoom;

  // Background for label
  const text   = station.name + (isDuplicate ? ' ⚠' : '');
  const metrics = ctx.measureText(text);
  const tw      = metrics.width + 4 / state.zoom;
  const th      = fontSize + 3 / state.zoom;

  ctx.fillStyle   = 'rgba(248,248,248,0.85)';
  ctx.fillRect(lx - tw / 2, ly - 1 / state.zoom, tw, th);

  ctx.fillStyle = isDuplicate ? '#e67e22' : (station.closed ? '#999' : '#222');
  ctx.fillText(text, lx, ly);
  ctx.restore();
}

// ---- Trains ----
function drawTrains() {
  for (const line of state.lines) {
    const color = LINE_COLORS.find(c => c.id === line.colorId)?.hex || '#888';
    for (const train of line.trains) {
      const pos = getTrainPosition(train);
      if (!pos) continue;

      ctx.save();
      ctx.translate(pos.x, pos.y);
      ctx.rotate(pos.ang);

      const tw = TRAIN_W / state.zoom;
      const th = TRAIN_H / state.zoom;

      // Shadow
      ctx.shadowColor   = 'rgba(0,0,0,0.25)';
      ctx.shadowBlur    = 3 / state.zoom;
      ctx.shadowOffsetY = 1 / state.zoom;

      // Body
      ctx.fillStyle = color;
      roundRect(ctx, -tw / 2, -th / 2, tw, th, Math.max(1, 2 / state.zoom));
      ctx.fill();

      // Outline
      ctx.shadowColor = 'transparent';
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.lineWidth   = Math.max(0.8, 1.2 / state.zoom);
      roundRect(ctx, -tw / 2, -th / 2, tw, th, Math.max(1, 2 / state.zoom));
      ctx.stroke();

      // Direction arrow
      const arrowSize = th * 0.35;
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath();
      ctx.moveTo(tw * 0.28, 0);
      ctx.lineTo(tw * 0.28 - arrowSize, -arrowSize * 0.7);
      ctx.lineTo(tw * 0.28 - arrowSize, arrowSize * 0.7);
      ctx.closePath();
      ctx.fill();

      // Train label (number)
      if (train.label) {
        ctx.fillStyle    = 'rgba(255,255,255,0.95)';
        ctx.font         = `bold ${Math.max(5, 7 / state.zoom)}px Inter, sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(train.label, -tw * 0.12, 0);
      }

      ctx.restore();
    }
  }
}

/** Helper: draw a rounded rectangle path. */
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// =====================================================================
// EVENT HANDLING
// =====================================================================
let mouseScreenX = 0, mouseScreenY = 0;

canvas.addEventListener('mousemove', onMouseMove);
canvas.addEventListener('mousedown', onMouseDown);
canvas.addEventListener('mouseup',   onMouseUp);
canvas.addEventListener('dblclick',  onDblClick);
canvas.addEventListener('wheel',     onWheel, { passive: false });
canvas.addEventListener('contextmenu', e => e.preventDefault());

function getWorldPos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx   = e.clientX - rect.left;
  const sy   = e.clientY - rect.top;
  return screenToWorld(sx, sy);
}
function getScreenPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function onMouseMove(e) {
  const sp = getScreenPos(e);
  mouseScreenX = sp.x; mouseScreenY = sp.y;
  const wp = getWorldPos(e);

  // Update status bar coords
  document.getElementById('status-coords').textContent =
    `X: ${Math.round(wp.x)}  Y: ${Math.round(wp.y)}`;

  // Pan
  if (state.isPanning) {
    state.panX = state.panStartPanX + (sp.x - state.panStartX);
    state.panY = state.panStartPanY + (sp.y - state.panStartY);
    return;
  }

  // Drag station (select tool)
  if (state.dragging) {
    const st = getStation(state.dragging.stationId);
    if (st) {
      st.x = wp.x + state.dragging.dx;
      st.y = wp.y + state.dragging.dy;
    }
    return;
  }

  // Freehand line drawing — sample points and rebuild snapped dot sequence
  if (state.isDrawingLine) {
    state.freehandPoints.push(wp);
    state.freehandDots = buildDotSequence(state.freehandPoints);
    return;
  }

  // Station/general hover preview
  state.previewPt = wp;
}

function onMouseDown(e) {
  const sp = getScreenPos(e);
  const wp = getWorldPos(e);

  // Middle mouse / right mouse = pan
  if (e.button === 1 || (e.button === 2)) {
    state.isPanning   = true;
    state.panStartX   = sp.x;
    state.panStartY   = sp.y;
    state.panStartPanX = state.panX;
    state.panStartPanY = state.panY;
    canvas.classList.add('panning');
    return;
  }

  // Alt+drag = pan
  if (e.altKey) {
    state.isPanning    = true;
    state.panStartX    = sp.x;
    state.panStartY    = sp.y;
    state.panStartPanX = state.panX;
    state.panStartPanY = state.panY;
    canvas.classList.add('panning');
    return;
  }

  if (e.button !== 0) return;

  const { tool } = state;

  if (tool === 'select') {
    // Try to pick a station
    const st = findNearestStation(wp.x, wp.y, (STATION_R + 6) / state.zoom);
    if (st) {
      state.selectedId = { type: 'station', id: st.id };
      state.dragging   = { stationId: st.id, dx: st.x - wp.x, dy: st.y - wp.y };
      updateSidebar();
    } else {
      // Try to pick a line (click near a segment)
      const line = findLineNearPoint(wp.x, wp.y, 8 / state.zoom);
      if (line) {
        state.selectedId = { type: 'line', id: line.id };
        showLineNameInput(line);
        updateSidebar();
      } else {
        state.selectedId = null;
        document.getElementById('line-name-input').style.display = 'none';
        updateSidebar();
      }
    }
    return;
  }

  if (tool === 'station') {
    const st = addStation(wp.x, wp.y);
    state.selectedId = { type: 'station', id: st.id };
    updateSidebar();
    return;
  }

  if (tool === 'connection') {
    // Start freehand stroke
    state.isDrawingLine  = true;
    state.freehandPoints = [wp];
    state.freehandDots   = buildDotSequence([wp]);
    state.previewPt      = null;
    return;
  }

  if (tool === 'close-station') {
    const st = findNearestStation(wp.x, wp.y, (STATION_R + 6) / state.zoom);
    if (st) {
      st.closed = !st.closed;
      updateSidebar();
      scheduleSave();
    }
    return;
  }

}

function onMouseUp(e) {
  if (state.isPanning) {
    state.isPanning = false;
    canvas.classList.remove('panning');
    scheduleSave();
  }
  if (state.dragging) {
    state.dragging = null;
    scheduleSave();
  }
  // Commit freehand line stroke
  if (state.isDrawingLine) {
    state.isDrawingLine = false;
    commitFreehandLine(state.freehandDots);
    state.freehandPoints = [];
    state.freehandDots   = [];
  }
}

function onDblClick(e) {
  const wp = getWorldPos(e);

  // Double-click on station to rename
  if (state.tool === 'select') {
    const st = findNearestStation(wp.x, wp.y, (STATION_R + 8) / state.zoom);
    if (st) {
      startInlineEdit(st, mouseScreenX, mouseScreenY);
      return;
    }
    // Double-click on line
    const line = findLineNearPoint(wp.x, wp.y, 8 / state.zoom);
    if (line) {
      const newName = prompt('Line name:', line.name);
      if (newName !== null) { line.name = newName.trim() || line.name; updateSidebar(); }
      return;
    }
  }
}

function onWheel(e) {
  e.preventDefault();
  const sp     = getScreenPos(e);
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newZoom = Math.max(0.15, Math.min(8, state.zoom * factor));

  // Zoom toward cursor
  state.panX = sp.x - (sp.x - state.panX) * (newZoom / state.zoom);
  state.panY = sp.y - (sp.y - state.panY) * (newZoom / state.zoom);
  state.zoom = newZoom;

  document.getElementById('status-zoom').textContent =
    'Zoom: ' + Math.round(state.zoom * 100) + '%';
  scheduleSave();
}

// ---- Commit freehand stroke to actual stations + connections ----
function commitFreehandLine(dots) {
  if (dots.length < 2) return;
  const line = getOrCreateActiveLine();

  // Only place stations at the start/end endpoints, or reuse existing stations
  // that the drawn path passes through — don't auto-create at every intermediate dot.
  const keyStations = [];
  for (let i = 0; i < dots.length; i++) {
    const d        = dots[i];
    const existing = findNearestStation(d.x, d.y, 2);
    const isEndpoint = i === 0 || i === dots.length - 1;
    if (isEndpoint) {
      // Always create or reuse a station at the two endpoints
      keyStations.push(existing || addStation(d.x, d.y));
    } else if (existing) {
      // Pass through an existing intermediate station
      keyStations.push(existing);
    }
  }

  // Deduplicate consecutive identical stations
  const unique = [keyStations[0]];
  for (let i = 1; i < keyStations.length; i++) {
    if (keyStations[i].id !== unique[unique.length - 1].id) unique.push(keyStations[i]);
  }
  if (unique.length < 2) return;

  // Build the ordered station list on this line
  const ids = line.stationIds;
  if (ids.length === 0) {
    // Fresh line — add all stations
    for (const st of unique) {
      ids.push(st.id);
      st.lineIds.add(line.id);
    }
    spawnInitialTrain(line);
  } else {
    // Extend or merge: try to graft new stations onto an existing terminus
    const headSt = getStation(ids[0]);
    const tailSt = getStation(ids[ids.length - 1]);

    const matchHead  = unique.findIndex(s => s.id === headSt?.id);
    const matchTail  = unique.findIndex(s => s.id === tailSt?.id);

    if (matchTail !== -1) {
      // New stroke starts (or passes through) the tail — append new stations after it
      const oldLastSegIdx = ids.length - 2; // last segment before extension
      const toAdd = unique.slice(matchTail + 1);
      for (const st of toAdd) { ids.push(st.id); st.lineIds.add(line.id); }

      // Any train that had already reversed at the old tail terminus should be
      // flipped forward so it continues toward the new terminus instead of going backward.
      if (toAdd.length > 0) {
        for (const train of line.trains) {
          if (train.direction === -1 && train.segIdx === oldLastSegIdx) {
            train.direction = 1;
            train.segIdx    = oldLastSegIdx + 1;
            train.progress  = 0;
            train.state     = 'moving';
          }
        }
      }
    } else if (matchHead !== -1) {
      // New stroke starts (or passes through) the head — prepend new stations before it
      const toAdd = unique.slice(0, matchHead).reverse();
      const numPrepended = toAdd.length;
      for (const st of toAdd) { ids.unshift(st.id); st.lineIds.add(line.id); }

      // Prepending shifts every segment index by numPrepended — fix all trains.
      if (numPrepended > 0) {
        for (const train of line.trains) {
          train.segIdx += numPrepended;
        }
      }
    } else {
      // No overlap — just append
      for (const st of unique) {
        if (!ids.includes(st.id)) { ids.push(st.id); st.lineIds.add(line.id); }
      }
    }
  }

  NumberTrains(line);
  state.selectedId = { type: 'line', id: line.id };
  showLineNameInput(line);
  updateSidebar();
  scheduleSave();
}

// ---- Find a line close to a world point ----
function findLineNearPoint(wx, wy, threshold) {
  for (const line of state.lines) {
    const ids = line.stationIds;
    for (let i = 0; i < ids.length - 1; i++) {
      const a = getStation(ids[i]);
      const b = getStation(ids[i + 1]);
      if (!a || !b) continue;
      const dist = pointSegmentDist(wx, wy, a.x, a.y, b.x, b.y);
      if (dist < threshold) return line;
    }
  }
  return null;
}

function pointSegmentDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  if (dx === 0 && dy === 0) return Math.hypot(px - ax, py - ay);
  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / (dx * dx + dy * dy)));
  return Math.hypot(px - ax - t * dx, py - ay - t * dy);
}

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const k = e.key.toLowerCase();
  if (k === 'v') setTool('select');
  if (k === 's') setTool('station');
  if (k === 'l') setTool('connection');
  if (k === 'c') setTool('close-station');
  if (k === 't') addTrainToSelectedLine();
  if (k === 'escape') {
    setTool('select'); // resets all drawing state
  }
  if (k === 'delete' || k === 'backspace') {
    deleteSelected();
  }
});

function deleteSelected() {
  const sel = state.selectedId;
  if (!sel) return;
  if (sel.type === 'station') {
    const idx = state.stations.findIndex(s => s.id === sel.id);
    if (idx !== -1) {
      const st = state.stations[idx];
      // Remove from all lines
      for (const line of state.lines) {
        line.stationIds = line.stationIds.filter(id => id !== st.id);
      }
      state.stations.splice(idx, 1);
    }
  } else if (sel.type === 'line') {
    const idx = state.lines.findIndex(l => l.id === sel.id);
    if (idx !== -1) {
      const line = state.lines[idx];
      // Clean up station lineIds
      for (const sid of line.stationIds) {
        const st = getStation(sid);
        if (st) st.lineIds.delete(line.id);
      }
      state.lines.splice(idx, 1);
    }
  }
  state.selectedId = null;
  updateSidebar();
}

// =====================================================================
// INLINE STATION NAME EDITOR
// =====================================================================
let activeEditor = null;

function startInlineEdit(station, sx, sy) {
  if (activeEditor) activeEditor.remove();

  const input    = document.createElement('input');
  input.type     = 'text';
  input.value    = station.name;
  input.className = 'inline-editor';
  input.style.left = (sx + 10) + 'px';
  input.style.top  = (sy - 14) + 'px';
  document.body.appendChild(input);
  activeEditor = input;
  input.focus();
  input.select();

  const finish = () => {
    const v = input.value.trim();
    if (v) station.name = v;
    input.remove();
    activeEditor = null;
    updateSidebar();
    scheduleSave();
  };
  input.addEventListener('blur',  finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') finish();
    if (e.key === 'Escape') { input.remove(); activeEditor = null; }
  });
}

// =====================================================================
// LINE NAME INPUT
// =====================================================================
function showLineNameInput(line) {
  const inp = document.getElementById('line-name-input');
  inp.style.display = 'inline-block';
  inp.value = line.name;
}

function onLineNameInput(val) {
  const sel = state.selectedId;
  if (sel?.type === 'line') {
    const line = getLine(sel.id);
    if (line) {
      line.name = val;
      // Update only the matching label in the sidebar without a full rebuild,
      // so the input cursor is never disrupted while typing.
      const nameEls = document.querySelectorAll('#sidebar-lines .item-name');
      let idx = 0;
      for (const l of state.lines) {
        if (l.id === line.id && nameEls[idx]) {
          nameEls[idx].textContent = val;
          break;
        }
        idx++;
      }
      scheduleSave();
    }
  }
}

// =====================================================================
// SIDEBAR
// =====================================================================
function switchTab(tab) {
  state.sidebarTab = tab;
  document.getElementById('sidebar-lines').style.display    = tab === 'lines'    ? 'block' : 'none';
  document.getElementById('sidebar-stations').style.display = tab === 'stations' ? 'block' : 'none';
  document.getElementById('tab-lines').classList.toggle('active',    tab === 'lines');
  document.getElementById('tab-stations').classList.toggle('active', tab === 'stations');
}

function updateSidebar() {
  updateSidebarLines();
  updateSidebarStations();

  // Sync the line name input to the currently selected line,
  // but never overwrite it while the user is actively typing in it.
  const inp = document.getElementById('line-name-input');
  const sel = state.selectedId;
  if (sel?.type === 'line') {
    const line = getLine(sel.id);
    if (line && document.activeElement !== inp) {
      inp.value = line.name;
    }
    inp.style.display = 'inline-block';
  } else if (state.tool !== 'connection') {
    inp.style.display = 'none';
  }
}

function updateSidebarLines() {
  const container = document.getElementById('sidebar-lines');
  container.innerHTML = '';

  if (state.lines.length === 0) {
    container.innerHTML = '<div style="color:#555;font-size:11px;padding:8px;">No lines yet. Select the Line tool, choose a colour, and click two stations to connect them.</div>';
    return;
  }

  for (const line of state.lines) {
    const color    = LINE_COLORS.find(c => c.id === line.colorId)?.hex || '#888';
    const isSelected = state.selectedId?.type === 'line' && state.selectedId?.id === line.id;

    const div = document.createElement('div');
    div.className = 'sidebar-item' + (isSelected ? ' selected' : '');
    div.innerHTML = `
      <span class="item-dot" style="background:${color}"></span>
      <span class="item-name">${escHtml(line.name)}</span>
      <span class="item-meta" title="${line.trains.length} train(s)">🚆 ${line.trains.length}</span>
    `;
    div.addEventListener('click', () => {
      state.selectedId = { type: 'line', id: line.id };
      updateSidebar();
    });
    container.appendChild(div);

    // Show stations on this line compactly
    if (line.stationIds.length > 0) {
      const stDiv = document.createElement('div');
      stDiv.style.cssText = 'padding:2px 6px 6px 24px;font-size:10px;color:#6c7a9c;';
      stDiv.textContent = line.stationIds.map(id => getStation(id)?.name || '?').join(' → ');
      container.appendChild(stDiv);
    }
  }
}

function updateSidebarStations() {
  const container = document.getElementById('sidebar-stations');
  container.innerHTML = '';

  if (state.stations.length === 0) {
    container.innerHTML = '<div style="color:#555;font-size:11px;padding:8px;">No stations yet. Select the Station tool and click on the canvas.</div>';
    return;
  }

  // Detect duplicate names
  const nameCounts = {};
  for (const s of state.stations) {
    nameCounts[s.name] = (nameCounts[s.name] || 0) + 1;
  }

  for (const st of state.stations) {
    const isSelected = state.selectedId?.type === 'station' && state.selectedId?.id === st.id;
    const isDuplicate = nameCounts[st.name] > 1;

    const div = document.createElement('div');
    div.className = 'sidebar-item' + (isSelected ? ' selected' : '');

    // Get line color for dot (first line)
    const lineId  = [...st.lineIds][0];
    const line    = lineId ? getLine(lineId) : null;
    const color   = line ? (LINE_COLORS.find(c => c.id === line.colorId)?.hex || '#888') : '#888';
    const dotStyle = st.lineIds.size >= 2
      ? 'border:2px solid #444;background:#fff'
      : `background:${color}`;

    div.innerHTML = `
      <span class="item-dot" style="${dotStyle}"></span>
      <span class="item-name">${escHtml(st.name)}${isDuplicate ? ' <span class="warn-badge">DUP</span>' : ''}</span>
      <span class="item-status ${st.closed ? 'closed' : 'open'}">${st.closed ? 'Closed' : 'Open'}</span>
    `;
    div.addEventListener('click', () => {
      state.selectedId = { type: 'station', id: st.id };
      updateSidebar();
    });
    div.addEventListener('dblclick', e => {
      startInlineEdit(st, e.clientX, e.clientY);
    });
    container.appendChild(div);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =====================================================================
// MISC UI
// =====================================================================
function resetView() {
  state.panX = 80;
  state.panY = 80;
  state.zoom = 1;
  document.getElementById('status-zoom').textContent = 'Zoom: 100%';
}

function clearAll() {
  if (!confirm('Clear all stations and lines?')) return;
  state.stations    = [];
  state.lines       = [];
  state.selectedId    = null;
  state.isDrawingLine  = false;
  state.freehandPoints = [];
  state.freehandDots   = [];
  state.nextStationId = 1;
  state.nextLineId    = 1;
  state.nextTrainId   = 1;
  _namePoolIndex      = 0;
  localStorage.removeItem('metroDesignerState');
  updateSidebar();
}

// =====================================================================
// PERSISTENCE
// =====================================================================
// Auto-save on changes (debounced)
let saveTimeout;
function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveState(), 500);
}

function saveState() {
  try {
    const data = {
      stations: state.stations.map(s => ({
        ...s,
        lineIds: Array.from(s.lineIds) // Convert Set to Array
      })),
      lines: state.lines.map(l => ({
        ...l,
        trains: l.trains.map(t => ({ ...t })) // Deep copy trains
      })),
      nextStationId: state.nextStationId,
      nextLineId: state.nextLineId,
      nextTrainId: state.nextTrainId,
      namePoolIndex: _namePoolIndex,
      panX: state.panX,
      panY: state.panY,
      zoom: state.zoom,
    };
    localStorage.setItem('metroDesignerState', JSON.stringify(data));
  } catch (e) {
    console.error('Failed to save state:', e);
  }
}

function loadState() {
  try {
    const saved = localStorage.getItem('metroDesignerState');
    if (!saved) return false;
    
    const data = JSON.parse(saved);
    
    // Restore stations (convert lineIds back to Set)
    state.stations = data.stations.map(s => ({
      ...s,
      lineIds: new Set(s.lineIds)
    }));
    
    // Restore lines
    state.lines = data.lines.map(l => ({
      ...l,
      trains: l.trains.map(t => ({ ...t }))
    }));
    
    // Restore counters
    state.nextStationId = data.nextStationId || 1;
    state.nextLineId = data.nextLineId || 1;
    state.nextTrainId = data.nextTrainId || 1;
    _namePoolIndex = data.namePoolIndex || 0;
    
    // Restore viewport
    state.panX = data.panX || 0;
    state.panY = data.panY || 0;
    state.zoom = data.zoom || 1;
    
    return true;
  } catch (e) {
    console.error('Failed to load state:', e);
    return false;
  }
}

// Temp tooltip message
function showTooltipMsg(msg, duration) {
  const tt = document.getElementById('tooltip');
  tt.textContent = msg;
  tt.style.display = 'block';
  tt.style.left = (mouseScreenX + 14) + 'px';
  tt.style.top  = (mouseScreenY - 10) + 'px';
  setTimeout(() => { tt.style.display = 'none'; }, duration || 2000);
}

// =====================================================================
// DEMO MAP
// =====================================================================
function buildDemoMap() {
  // ── Red Line (horizontal) ──────────────────────────────────────────
  // Red Line
  const redSt = [
    addStation(160, 240), addStation(280, 240),
    addStation(400, 240), addStation(520, 240),
    addStation(640, 240),
  ];
  redSt[0].name = 'Westgate';
  redSt[1].name = 'Park Road';
  redSt[2].name = 'Central';
  redSt[3].name = 'City Hall';
  redSt[4].name = 'Riverside East';

  const redLine = { id: lid(), name: 'Red Line', colorId: 'red', stationIds: [], trains: [] };
  state.lines.push(redLine);
  for (const s of redSt) connectStations(redLine, redSt[0], s); // we'll do it properly
  // Reset and use proper chaining
  redLine.stationIds = [];
  for (const s of redSt) s.lineIds.delete(redLine.id);
  redLine.stationIds = redSt.map(s => s.id);
  for (const s of redSt) s.lineIds.add(redLine.id);
  spawnInitialTrain(redLine);

  // Blue line (diagonal — snapped 45°)
  const blueA = addStation(280, 360); blueA.name = 'South Quay';
  const blueB = redSt[2];            // Central (interchange)
  const blueC = addStation(480, 160); blueC.name = 'Northfield';
  const blueD = addStation(560, 80);  blueD.name = 'Airport';

  const blueLine = { id: lid(), name: 'Blue Line', colorId: 'blue', stationIds: [], trains: [] };
  state.lines.push(blueLine);
  blueLine.stationIds = [blueA.id, blueB.id, blueC.id, blueD.id];
  for (const s of [blueA, blueB, blueC, blueD]) s.lineIds.add(blueLine.id);
  spawnInitialTrain(blueLine);

  // Green line
  const greenA = addStation(200, 360); greenA.name = 'Harbour';
  const greenB = blueA;               // South Quay (interchange)
  const greenC = addStation(400, 360); greenC.name = 'Market';
  const greenD = addStation(520, 360); greenD.name = 'Stadium';

  const greenLine = { id: lid(), name: 'Green Line', colorId: 'green', stationIds: [], trains: [] };
  state.lines.push(greenLine);
  greenLine.stationIds = [greenA.id, greenB.id, greenC.id, greenD.id];
  for (const s of [greenA, greenB, greenC, greenD]) s.lineIds.add(greenLine.id);
  spawnInitialTrain(greenLine);

  // Add second train to red line
  const extraTrain = makeTrain(redLine.id, 2, 0.5, 1);
  extraTrain.label = '2';
  redLine.trains[0].label = '1';
  redLine.trains.push(extraTrain);

  updateSidebar();
}

// =====================================================================
// INIT
// =====================================================================
resetView();

// Load saved state or build demo map
try {
  if (!loadState()) {
    buildDemoMap();
  }
} catch (e) {
  console.error('Failed to load state, clearing and starting fresh:', e);
  localStorage.removeItem('metroDesignerState');
  buildDemoMap();
}

setTool('select');
updateSidebar();
document.getElementById('status-zoom').textContent = `Zoom: ${Math.round(state.zoom * 100)}%`;

// Save on page unload
window.addEventListener('beforeunload', () => saveState());

// Kick off render loop
requestAnimationFrame(render);
</script>
