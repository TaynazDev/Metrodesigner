function getOrCreateActiveLine() {
  // Find existing line with active color that isn't "completed" (we allow multiple per color, but
  // default to the most recently used line of this color)
  const colorId = state.activeColorId;

  // If something is selected in sidebar, use that line
  if (state.selectedId && state.selectedId.type === 'line') {
    const l = getLine(state.selectedId.id);
    if (l && l.colorId === colorId) return l;
  }

  // Find the line with this color and the most stations (last edited)
  const candidates = state.lines.filter(l => l.colorId === colorId);
  if (candidates.length > 0) return candidates[candidates.length - 1];

  // Create new line
  const color = getActiveColor();
  const newLine = {
    id:         lid(),
    name:       color.name + ' Line',
    colorId:    colorId,
    stationIds: [],
    trains:     [],
    dots:       [],  // full grid-dot path for smooth rendering
  };
  state.lines.push(newLine);
  return newLine;
}

function addStation(wx, wy) {
  // Snap placement to the nearest grid dot
  const g = snapToGrid(wx, wy);
  wx = g.x; wy = g.y;

  // Check if near existing station
  const near = findNearestStation(wx, wy, SNAP_DIST / state.zoom);
  if (near) return near;

  const st = {
    id:      sid(),
    x:       wx,
    y:       wy,
    name:    nextStationName(),
    closed:  false,
    lineIds: new Set(),
  };
  state.stations.push(st);
  scheduleSave();
  return st;
}

function findNearestStation(wx, wy, maxDist) {
  let best = null, bestD = maxDist;
  for (const s of state.stations) {
    const d = Math.hypot(s.x - wx, s.y - wy);
    if (d < bestD) { bestD = d; best = s; }
  }
  return best;
}

/** Connect two stations on a line (order matters for path) */
function connectStations(line, stA, stB) {
  const ids = line.stationIds;

  // If line is empty, add both
  if (ids.length === 0) {
    ids.push(stA.id, stB.id);
    stA.lineIds.add(line.id);
    stB.lineIds.add(line.id);
    spawnInitialTrain(line);
    return;
  }

  // stB already in line?
  const iB = ids.indexOf(stB.id);
  const iA = ids.indexOf(stA.id);

  // Extend head (prepend) or tail (append)
  const head = ids[0];
  const tail = ids[ids.length - 1];

  if (stA.id === tail && iB === -1) {
    // Extend tail: A is tail, B is new
    const oldLastSegIdx = ids.length - 2;
    ids.push(stB.id);
    stB.lineIds.add(line.id);
    stA.lineIds.add(line.id);
    // Fix trains that reversed at old tail — flip them to continue forward
    for (const train of line.trains) {
      if (train.direction === -1 && train.segIdx === oldLastSegIdx) {
        train.direction = 1;
        train.segIdx    = oldLastSegIdx + 1;
        train.progress  = 0;
        train.state     = 'moving';
      }
    }
  } else if (stA.id === head && iB === -1) {
    // Extend head: A is head, B is new
    ids.unshift(stB.id);
    stB.lineIds.add(line.id);
    stA.lineIds.add(line.id);
    // Prepending shifts all segment indices by 1
    for (const train of line.trains) {
      train.segIdx += 1;
    }
  } else if (stB.id === tail && iA === -1) {
    const oldLastSegIdx = ids.length - 2;
    ids.push(stA.id);
    stA.lineIds.add(line.id);
    stB.lineIds.add(line.id);
    // Fix trains that reversed at old tail — flip them to continue forward
    for (const train of line.trains) {
      if (train.direction === -1 && train.segIdx === oldLastSegIdx) {
        train.direction = 1;
        train.segIdx    = oldLastSegIdx + 1;
        train.progress  = 0;
        train.state     = 'moving';
      }
    }
  } else if (stB.id === head && iA === -1) {
    ids.unshift(stA.id);
    stA.lineIds.add(line.id);
    stB.lineIds.add(line.id);
    // Prepending shifts all segment indices by 1
    for (const train of line.trains) {
      train.segIdx += 1;
    }
  } else if (iA !== -1 && iB === -1) {
    // Insert B after A
    ids.splice(iA + 1, 0, stB.id);
    stB.lineIds.add(line.id);
    // Inserting shifts all segment indices at or after insertion point
    for (const train of line.trains) {
      if (train.segIdx >= iA + 1) {
        train.segIdx += 1;
      }
    }
  } else if (iB !== -1 && iA === -1) {
    ids.splice(iB + 1, 0, stA.id);
    stA.lineIds.add(line.id);
    // Inserting shifts all segment indices at or after insertion point
    for (const train of line.trains) {
      if (train.segIdx >= iB + 1) {
        train.segIdx += 1;
      }
    }
  } else {
    // Both already in line — just ensure membership
    stA.lineIds.add(line.id);
    stB.lineIds.add(line.id);
  }

  if (ids.length === 2) spawnInitialTrain(line);

  // Normalize special topologies so train flow matches intended direction.
  normalizeSpecialTopologies(line);

  scheduleSave();
}

/**
 * Detect a lollipop topology by graph degree (spur end degree 1, junction
 * degree 3) and rebuild the path as:
 *   [SpurEnd, Junction, ...clockwise loop..., Junction, SpurEnd]
 * This guarantees trains follow the same direction around the loop
 * regardless of the order stations were originally drawn.
 */
function normalizeLollipop(line) {
  const ids = line.stationIds;
  if (ids.length < 4) return;

  // Build an undirected graph from station sequence edges.
  const adj = new Map();
  function addEdge(a, b) {
    if (!adj.has(a)) adj.set(a, new Set());
    if (!adj.has(b)) adj.set(b, new Set());
    adj.get(a).add(b);
    adj.get(b).add(a);
  }
  for (let i = 0; i < ids.length - 1; i++) {
    addEdge(ids[i], ids[i + 1]);
  }

  let spurEnd = null;
  let junction = null;
  for (const [id, neighbors] of adj.entries()) {
    const deg = neighbors.size;
    if (deg === 1) {
      if (spurEnd !== null) return; // more than one spur end: not a lollipop
      spurEnd = id;
    } else if (deg === 3) {
      if (junction !== null) return; // more than one 3-way junction
      junction = id;
    } else if (deg !== 2) {
      return; // unsupported topology
    }
  }
  if (spurEnd === null || junction === null) return;

  const neighbors = Array.from(adj.get(junction));
  if (neighbors.length !== 3) return;

  const loopStarts = neighbors.filter(n => n !== spurEnd);
  if (loopStarts.length !== 2) return;

  function walkLoop(startNeighbor) {
    const path = [junction, startNeighbor];
    let prev = junction;
    let curr = startNeighbor;
    const guardMax = adj.size + 5;

    for (let step = 0; step < guardMax; step++) {
      const nbs = Array.from(adj.get(curr) || []);
      let next = null;
      for (const n of nbs) {
        if (n !== prev) { next = n; break; }
      }
      if (next === null) return null;
      path.push(next);
      if (next === junction) return path;
      prev = curr;
      curr = next;
    }
    return null;
  }

  function signedArea(pathIds) {
    let area = 0;
    for (let i = 0; i < pathIds.length - 1; i++) {
      const a = getStation(pathIds[i]);
      const b = getStation(pathIds[i + 1]);
      if (a && b) area += (a.x * b.y - b.x * a.y);
    }
    return area;
  }

  const p1 = walkLoop(loopStarts[0]);
  const p2 = walkLoop(loopStarts[1]);
  if (!p1 || !p2) return;

  // In screen coordinates (Y-down), positive signed area is clockwise.
  const clockwiseLoop = signedArea(p1) >= 0 ? p1 : p2;
  const rebuilt = [spurEnd, ...clockwiseLoop, spurEnd];

  // Skip if sequence is already exactly what we want.
  if (rebuilt.length === ids.length && rebuilt.every((id, i) => id === ids[i])) {
    return;
  }

  line.stationIds = rebuilt;

  // Route changed; reset trains to a deterministic start on the spur.
  for (const train of line.trains) {
    train.segIdx    = 0;
    train.progress  = 0.05;
    train.direction = 1;
    train.state     = 'moving';
    delete train._logged;
  }
}

/**
 * Detect a figure-eight topology using graph degree analysis:
 * exactly one degree-4 node (the shared junction), all others degree-2.
 * This is immune to normalizeLollipop corruption because it works on
 * unique-neighbor degree rather than raw ID occurrence counts.
 * Rebuilds the route as: junction → top-loop-CW → junction → bottom-loop-CCW → junction.
 */
function normalizeFigureEight(line) {
  const ids = line.stationIds;
  if (ids.length < 6) return false;

  // Build undirected adjacency graph.
  const adj = new Map();
  function addEdge(a, b) {
    if (!adj.has(a)) adj.set(a, new Set());
    if (!adj.has(b)) adj.set(b, new Set());
    adj.get(a).add(b);
    adj.get(b).add(a);
  }
  for (let i = 0; i < ids.length - 1; i++) addEdge(ids[i], ids[i + 1]);

  // Exactly one degree-4 node (the junction), all others degree-2.
  let junction = null;
  for (const [id, neighbors] of adj.entries()) {
    const deg = neighbors.size;
    if (deg === 4) {
      if (junction !== null) return false;
      junction = id;
    } else if (deg !== 2) {
      return false;
    }
  }
  if (junction === null) return false;

  // Walk a cycle starting from one of the junction's neighbors.
  function walkCycle(startNeighbor) {
    const path = [junction, startNeighbor];
    let prev = junction;
    let curr = startNeighbor;
    const guardMax = adj.size + 8;
    for (let step = 0; step < guardMax; step++) {
      const nbs = Array.from(adj.get(curr) || []);
      let next = null;
      for (const n of nbs) {
        if (n !== prev) { next = n; break; }
      }
      if (next === null) return null;
      path.push(next);
      if (next === junction) return path;
      prev = curr;
      curr = next;
    }
    return null;
  }

  // Canonical key for a cycle (direction-agnostic).
  function canonicalKey(path) {
    const body = path.slice(1, -1);
    const fwd = body.join(',');
    const rev = body.slice().reverse().join(',');
    return fwd < rev ? fwd : rev;
  }

  function signedArea(path) {
    let area = 0;
    for (let i = 0; i < path.length - 1; i++) {
      const a = getStation(path[i]);
      const b = getStation(path[i + 1]);
      if (a && b) area += (a.x * b.y - b.x * a.y);
    }
    return area;
  }

  function cycleCentroidY(path) {
    const body = path.slice(1, -1);
    if (body.length === 0) return 0;
    let sum = 0;
    for (const id of body) sum += (getStation(id)?.y || 0);
    return sum / body.length;
  }

  function orientCycle(path, wantPositiveArea) {
    const area = signedArea(path);
    if ((wantPositiveArea && area >= 0) || (!wantPositiveArea && area <= 0)) return path;
    const bodyRev = path.slice(1, -1).reverse();
    return [junction, ...bodyRev, junction];
  }

  // Discover the two unique cycles.
  const byKey = new Map();
  for (const n of Array.from(adj.get(junction) || [])) {
    const p = walkCycle(n);
    if (!p || p.length < 4) continue;
    const key = canonicalKey(p);
    if (!byKey.has(key)) byKey.set(key, []);
    byKey.get(key).push(p);
  }
  if (byKey.size !== 2) return false;

  const cycles = [];
  for (const variants of byKey.values()) {
    // Prefer positive-area variant as baseline; orientCycle will correct later if needed.
    let p = variants[0];
    if (variants.length > 1) {
      p = signedArea(variants[0]) >= 0 ? variants[0] : variants[1];
    }
    cycles.push(p);
  }

  // Sort: top loop (smaller screen Y = higher up) first.
  cycles.sort((a, b) => cycleCentroidY(a) - cycleCentroidY(b));

  // In Y-down screen coordinates: top loop CW (positive area), bottom loop CCW (negative area).
  const topLoop    = orientCycle(cycles[0], true);
  const bottomLoop = orientCycle(cycles[1], false);

  // User-expected order: bottom loop first (CCW), then top loop (CW).
  const rebuilt = [junction, ...bottomLoop.slice(1), ...topLoop.slice(1)];

  const _jName = getStation(junction)?.name || junction;
  const _bNames = bottomLoop.slice(1, -1).map(id => getStation(id)?.name || id);
  const _tNames = topLoop.slice(1, -1).map(id => getStation(id)?.name || id);
  console.log(`[FigureEight] junction=${_jName}`);
  console.log(`[FigureEight] bottom loop (CCW): ${_jName} → ${_bNames.join(' → ')} → ${_jName}`);
  console.log(`[FigureEight] top loop    (CW ): ${_jName} → ${_tNames.join(' → ')} → ${_jName}`);
  console.log(`[FigureEight] rebuilt: ${rebuilt.map(id => getStation(id)?.name || id).join(' → ')}`);

  line.stationIds = rebuilt;
  for (const train of line.trains) {
    train.segIdx    = 0;
    train.progress  = 0.05;
    train.direction = 1;
    train.state     = 'moving';
    delete train._logged;
  }
  return true;
}

function normalizeSpecialTopologies(line) {
  // Lollipop and figure-eight are mutually exclusive in supported shapes.
  normalizeLollipop(line);
  normalizeFigureEight(line);
}

function mergeTwoSameColorLinesAtSharedTerminus(lineA, lineB) {
  if (!lineA || !lineB) return false;
  if (lineA.id === lineB.id) return false;
  if (lineA.colorId !== lineB.colorId) return false;
  if (lineA.stationIds.length < 2 || lineB.stationIds.length < 2) return false;

  const aIds = lineA.stationIds.slice();
  const bIds = lineB.stationIds.slice();
  const aFirst = aIds[0], aLast = aIds[aIds.length - 1];
  const bFirst = bIds[0], bLast = bIds[bIds.length - 1];

  let shared = null;
  let aReversed = false;
  let bReversed = false;

  if (aLast === bFirst) {
    shared = aLast;
  } else if (aLast === bLast) {
    shared = aLast;
    bReversed = true;
  } else if (aFirst === bFirst) {
    shared = aFirst;
    aReversed = true;
  } else if (aFirst === bLast) {
    shared = aFirst;
    aReversed = true;
    bReversed = true;
  }

  if (shared === null) return false;

  const orientedA = aReversed ? aIds.slice().reverse() : aIds;
  const orientedB = bReversed ? bIds.slice().reverse() : bIds;
  if (orientedA[orientedA.length - 1] !== orientedB[0]) return false;

  const mergedIds = [...orientedA, ...orientedB.slice(1)];

  // Update station memberships: lineB is absorbed into lineA.
  for (const sid of new Set(bIds)) {
    const st = getStation(sid);
    if (!st) continue;
    st.lineIds.delete(lineB.id);
    st.lineIds.add(lineA.id);
  }

  lineA.stationIds = mergedIds;

  // Preserve freehand geometry if available on both lines.
  const aDots = lineA.dots && lineA.dots.length >= 2 ? (aReversed ? lineA.dots.slice().reverse() : lineA.dots.slice()) : null;
  const bDots = lineB.dots && lineB.dots.length >= 2 ? (bReversed ? lineB.dots.slice().reverse() : lineB.dots.slice()) : null;
  if (aDots && bDots) {
    lineA.dots = [...aDots, ...bDots.slice(1)];
  } else {
    lineA.dots = null;
  }

  // Reset trains on merge to avoid invalid segment indices.
  lineA.trains = [];
  spawnInitialTrain(lineA);
  NumberTrains(lineA);

  const bIdx = state.lines.findIndex(l => l.id === lineB.id);
  if (bIdx !== -1) state.lines.splice(bIdx, 1);
  return true;
}

function mergeConnectedSameColorLines() {
  let mergedAny = false;
  let changed = true;

  while (changed) {
    changed = false;
    outer:
    for (let i = 0; i < state.lines.length; i++) {
      for (let j = i + 1; j < state.lines.length; j++) {
        const a = state.lines[i];
        const b = state.lines[j];
        if (mergeTwoSameColorLinesAtSharedTerminus(a, b)) {
          changed = true;
          mergedAny = true;
          break outer;
        }
      }
    }
  }

  return mergedAny;
}

// =====================================================================
// TRAIN MANAGEMENT
// =====================================================================
/**
 * Spawn the first train for a line at segment 0, progress 0, going forward.
 */
function spawnInitialTrain(line) {
  if (line.stationIds.length < 2) return;
  if (line.trains.length > 0) return; // already has trains

  const train = makeTrain(line.id, 0, 0.05, 1);
  line.trains.push(train);
}

function makeTrain(lineId, segIdx, progress, direction) {
  return {
    id:            tid(),
    lineId,
    segIdx:        segIdx,   // index of segment (0 = between station[0] and station[1])
    progress:      progress, // 0..1 along segment
    direction:     direction, // +1 forward, -1 backward
    state:         'moving',
    stopRemaining: 0,
    label:         '',       // set after creation
  };
}

/** Add an extra train to a line, running opposite to the first. */
function addTrainToSelectedLine() {
  const sel = state.selectedId;
  if (!sel || sel.type !== 'line') {
    showTooltipMsg('Select a line first, then click Add Train.', 2000);
    return;
  }
  const line = getLine(sel.id);
  if (!line || line.stationIds.length < 2) return;

  const n = line.trains.length;
  if (n === 0) { spawnInitialTrain(line); return; }

  // Same direction as the first train
  const firstDir = line.trains[0].direction;
  const newDir   = firstDir;

  // Place new train roughly in the middle of the path in the opposite direction
  const totalSegs = line.stationIds.length - 1;
  const midSeg    = Math.floor(totalSegs / 2);
  const progress  = 0.5;

  const train = makeTrain(line.id, midSeg, progress, newDir);
  NumberTrains(line);
  line.trains.push(train);
  NumberTrains(line);
  updateSidebar();
  scheduleSave();
}

/** Assign sequential labels to trains on a line. */
function NumberTrains(line) {
  line.trains.forEach((t, i) => { t.label = String(i + 1); });
}

/**
 * Check if a line forms a closed loop.
 * A loop is detected when the first and last stations are the same.
 */
function isLoop(line) {
  const ids = line.stationIds;
  if (ids.length < 3) return false;
  return ids[0] === ids[ids.length - 1];
}

// =====================================================================
// TRAIN ANIMATION
// =====================================================================

/**
 * Return the sub-array of line.dots that spans from station[segIdx] to station[segIdx+1].
 * Returns null if dots are unavailable or stations don't map to dots.
 */
function getSegmentDots(line, segIdx) {
  const ids = line.stationIds;
  if (!line.dots || line.dots.length < 2) return null;
  const stA = getStation(ids[segIdx]);
  const stB = getStation(ids[segIdx + 1]);
  if (!stA || !stB) return null;
  // Find stA in dots
  let iA = -1;
  for (let i = 0; i < line.dots.length; i++) {
    if (line.dots[i].x === stA.x && line.dots[i].y === stA.y) { iA = i; break; }
  }
  if (iA === -1) return null;
  // Find stB in dots after iA
  let iB = -1;
  for (let i = iA + 1; i < line.dots.length; i++) {
    if (line.dots[i].x === stB.x && line.dots[i].y === stB.y) { iB = i; break; }
  }
  if (iB === -1) return null;
  return line.dots.slice(iA, iB + 1);
}

/**
 * Build sampled points along the same rounded-corner geometry used for rendering.
 * This keeps train motion visually centered on curved line corners.
 */
function sampleRoundedPathPoints(dots, radius) {
  if (!dots || dots.length < 2) return dots || [];
  if (dots.length === 2) return [dots[0], dots[1]];

  const out = [{ x: dots[0].x, y: dots[0].y }];
  const stepsPerCorner = 8;

  for (let i = 1; i < dots.length; i++) {
    if (i === dots.length - 1) {
      out.push({ x: dots[i].x, y: dots[i].y });
      continue;
    }

    const curr = dots[i];
    const prev = dots[i - 1];
    const next = dots[i + 1];

    const d1x = prev.x - curr.x;
    const d1y = prev.y - curr.y;
    const len1 = Math.hypot(d1x, d1y);
    const d2x = next.x - curr.x;
    const d2y = next.y - curr.y;
    const len2 = Math.hypot(d2x, d2y);

    if (len1 < 0.01 || len2 < 0.01) {
      out.push({ x: curr.x, y: curr.y });
      continue;
    }

    const r = Math.min(radius, len1 / 2, len2 / 2);
    const p0 = { x: curr.x + (d1x / len1) * r, y: curr.y + (d1y / len1) * r };
    const p1 = { x: curr.x, y: curr.y };
    const p2 = { x: curr.x + (d2x / len2) * r, y: curr.y + (d2y / len2) * r };

    out.push(p0);
    for (let s = 1; s <= stepsPerCorner; s++) {
      const t = s / stepsPerCorner;
      const omt = 1 - t;
      out.push({
        x: omt * omt * p0.x + 2 * omt * t * p1.x + t * t * p2.x,
        y: omt * omt * p0.y + 2 * omt * t * p1.y + t * t * p2.y,
      });
    }
  }

  return out;
}

/** Interpolate position+angle along a rounded path at progress 0..1. */
function getPositionAlongDots(dots, progress, direction) {
  if (!dots || dots.length < 2) {
    const p = dots?.[0] || { x: 0, y: 0 };
    return { x: p.x, y: p.y, ang: 0 };
  }

  const rounded = sampleRoundedPathPoints(dots, GRID_SPACING * 0.45);
  if (!rounded || rounded.length < 2) {
    const p = dots[0];
    return { x: p.x, y: p.y, ang: 0 };
  }

  let totalLen = 0;
  const segLens = [];
  for (let i = 0; i < rounded.length - 1; i++) {
    const l = Math.hypot(rounded[i + 1].x - rounded[i].x, rounded[i + 1].y - rounded[i].y);
    segLens.push(l);
    totalLen += l;
  }
  if (totalLen < 0.01) return { x: rounded[0].x, y: rounded[0].y, ang: 0 };

  const target = Math.max(0, Math.min(1, progress)) * totalLen;
  let traveled = 0;
  for (let i = 0; i < segLens.length; i++) {
    if (traveled + segLens[i] >= target || i === segLens.length - 1) {
      const t = segLens[i] > 0.001 ? (target - traveled) / segLens[i] : 0;
      const pt = rounded[i];
      const ptNext = rounded[i + 1];
      const ang = Math.atan2(ptNext.y - pt.y, ptNext.x - pt.x);
      return {
        x: pt.x + (ptNext.x - pt.x) * t,
        y: pt.y + (ptNext.y - pt.y) * t,
        ang: ang + (direction === -1 ? Math.PI : 0),
      };
    }
    traveled += segLens[i];
  }

  const last = rounded[rounded.length - 1];
  const prev = rounded[rounded.length - 2];
  return {
    x: last.x,
    y: last.y,
    ang: Math.atan2(last.y - prev.y, last.x - prev.x) + (direction === -1 ? Math.PI : 0),
  };
}

/** Arc-length of a rounded dot sub-path. */
function dotPathLength(dots) {
  if (!dots || dots.length < 2) return 1;
  const rounded = sampleRoundedPathPoints(dots, GRID_SPACING * 0.45);
  let len = 0;
  for (let i = 0; i < rounded.length - 1; i++) {
    len += Math.hypot(rounded[i + 1].x - rounded[i].x, rounded[i + 1].y - rounded[i].y);
  }
  return len || 1;
}

function getSegmentLength(line, segIdx) {
  const ids = line.stationIds;

  if (segIdx < 0 || segIdx >= ids.length - 1) return 1;
  const segDots = getSegmentDots(line, segIdx);
  if (segDots) return dotPathLength(segDots);

  const a = getStation(ids[segIdx]);
  const b = getStation(ids[segIdx + 1]);
  if (!a || !b) return 1;
  return Math.hypot(b.x - a.x, b.y - a.y) || 1;
}

function getTrainPosition(train) {
  const line = getLine(train.lineId);
  if (!line || line.stationIds.length < 2) return null;
  const ids = line.stationIds;

  const si = Math.max(0, Math.min(train.segIdx, ids.length - 2));
  const segDots = getSegmentDots(line, si);
  if (segDots) return getPositionAlongDots(segDots, train.progress, train.direction);

  const a  = getStation(ids[si]);
  const b  = getStation(ids[si + 1]);
  if (!a || !b) return null;
  const p   = train.progress;
  const ang = Math.atan2(b.y - a.y, b.x - a.x);
  return {
    x:   a.x + (b.x - a.x) * p,
    y:   a.y + (b.y - a.y) * p,
    ang: ang + (train.direction === -1 ? Math.PI : 0),
  };
}

/**
 * Find the effective terminus index in a given direction.
 * If all terminus stations are closed, the train still reverses at the real terminus but skips the stop.
 */
function effectiveTerminusIndex(line, dir) {
  const ids = line.stationIds;
  if (dir === 1) {
    // Forward: last station
    return ids.length - 1;
  } else {
    // Backward: first station
    return 0;
  }
}

/**
 * When a train arrives at stationIndex, decide whether to stop.
 * Returns true if it should stop.
 */
function shouldStop(line, stationIndex) {
  const st = getStation(line.stationIds[stationIndex]);
  return st && !st.closed;
}

function updateTrain(train, dt) {
  const line = getLine(train.lineId);
  if (!line || line.stationIds.length < 2) return;
  const ids = line.stationIds;
  const loop = isLoop(line);

  // DEBUG: Log full station sequence once
  if (!train._logged) {
    train._logged = true;
    const names = ids.map(id => getStation(id)?.name || '?');
    console.log(`Train route (loop=${loop}): [${names.join(' → ')}]`);
    console.log(`Station IDs: [${ids.join(', ')}]`);
  }

  // --- STOPPED STATE ---
  if (train.state === 'stopped') {
    train.stopRemaining -= dt;
    if (train.stopRemaining <= 0) {
      train.state         = 'stopped_done'; // will transition below
      train.stopRemaining = 0;
      // Start moving in current direction
      train.state = 'moving';
    }
    return;
  }

  // --- MOVING STATE ---
  const segLen = getSegmentLength(line, train.segIdx);
  const dp     = (TRAIN_SPEED * dt / 1000) / segLen;

  train.progress += dp * train.direction;

  if (loop) {
    // === LOOP MODE: automatic junction navigation based on momentum ===
    if (train.progress >= 1) {
      const prevIdx = train.segIdx;
      const currentStationId = ids[prevIdx];
      const nextStationId = ids[prevIdx + 1];
      
      // Calculate current travel direction vector for momentum
      const currentSt = getStation(currentStationId);
      const nextSt = getStation(nextStationId);
      if (currentSt && nextSt) {
        train.momentumAngle = Math.atan2(nextSt.y - currentSt.y, nextSt.x - currentSt.x);
      }
      
      train.segIdx++;
      train.progress = 0;
      
      // Wrap from last segment back to segment 0
      if (train.segIdx >= ids.length - 1) {
        train.segIdx = 0;
        delete train.momentumAngle;
      }
      
      // Keep loop routing deterministic by following explicit station order.
      // This avoids wrong turns at complex shared junctions.
      const arrivedStationId = ids[train.segIdx];
      
      // Check station arrivals
      const arrivedStationIdx = train.segIdx === 0 ? 0 : train.segIdx;
      
      if (shouldStop(line, arrivedStationIdx)) {
        train.state = 'stopped';
        train.stopRemaining = STOP_DURATION;
      }
    }
  } else {
    // === LINEAR MODE: trains reverse at termini ===
    // Arrived at forward end of segment?
    if (train.direction === 1 && train.progress >= 1) {
      const arrivedIdx = train.segIdx + 1;

      if (arrivedIdx >= ids.length - 1) {
        // Reached last station — reverse
        train.segIdx     = ids.length - 2;
        train.progress   = 1.0;
        train.direction  = -1;
        if (shouldStop(line, ids.length - 1)) {
          train.state         = 'stopped';
          train.stopRemaining = STOP_DURATION;
        }
      } else {
        // Move to next segment
        train.segIdx   = arrivedIdx;
        train.progress = 0;
        if (shouldStop(line, arrivedIdx)) {
          train.state         = 'stopped';
          train.stopRemaining = STOP_DURATION;
        }
      }

    } else if (train.direction === -1 && train.progress <= 0) {
      const arrivedIdx = train.segIdx;

      if (arrivedIdx <= 0) {
        // Reached first station — reverse
        train.segIdx    = 0;
        train.progress  = 0.0;
        train.direction = 1;
        if (shouldStop(line, 0)) {
          train.state         = 'stopped';
          train.stopRemaining = STOP_DURATION;
        }
      } else {
        // Move to previous segment
        train.segIdx   = arrivedIdx - 1;
        train.progress = 1.0;
        if (shouldStop(line, arrivedIdx)) {
          train.state         = 'stopped';
          train.stopRemaining = STOP_DURATION;
        }
      }
    }
  }
}

// =====================================================================
// RENDERING
// =====================================================================
function render(timestamp) {
  const dt = state.lastTime ? Math.min(timestamp - state.lastTime, 100) : 16;
  state.lastTime = timestamp;

  // Update all trains
  for (const line of state.lines) {
    for (const train of line.trains) {
      updateTrain(train, dt);
    }
  }

  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // White canvas background
  ctx.fillStyle = '#f8f8f8';
  ctx.fillRect(0, 0, W, H);

  // Save and apply viewport transform
  ctx.save();
  ctx.translate(state.panX, state.panY);
  ctx.scale(state.zoom, state.zoom);

  drawGrid();
  drawConnections();
  drawPreviewLine();
  drawStationPreview();
  drawStations();
  drawTrains();

  ctx.restore();

  requestAnimationFrame(render);
}

// ---- Grid ----
function drawGrid() {
  const invZoom = 1 / state.zoom;
  const ox = -state.panX * invZoom;
  const oy = -state.panY * invZoom;
  const W  = canvas.width  * invZoom;
  const H  = canvas.height * invZoom;

  const sp = GRID_SPACING;
  const startX = Math.floor(ox / sp) * sp;
  const startY = Math.floor(oy / sp) * sp;

  ctx.fillStyle = '#c8cdd8';
  const r = Math.max(1, 1.5 * invZoom);
  for (let x = startX; x < ox + W + sp; x += sp) {
    for (let y = startY; y < oy + H + sp; y += sp) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ---- Helper: draw a polyline with smooth rounded corners ----
function drawRoundedPolyline(pts, radius) {
  if (pts.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    if (i === pts.length - 1) {
      ctx.lineTo(pts[i].x, pts[i].y);
    } else {
      const curr = pts[i];
      const prev = pts[i - 1];
      const next = pts[i + 1];
      const d1x = prev.x - curr.x, d1y = prev.y - curr.y;
      const len1 = Math.hypot(d1x, d1y);
      const d2x = next.x - curr.x, d2y = next.y - curr.y;
      const len2 = Math.hypot(d2x, d2y);
      if (len1 < 0.01 || len2 < 0.01) { ctx.lineTo(curr.x, curr.y); continue; }
      const r = Math.min(radius, len1 / 2, len2 / 2);
      const cp1x = curr.x + d1x / len1 * r, cp1y = curr.y + d1y / len1 * r;
      const cp2x = curr.x + d2x / len2 * r, cp2y = curr.y + d2y / len2 * r;
      ctx.lineTo(cp1x, cp1y);
      ctx.quadraticCurveTo(curr.x, curr.y, cp2x, cp2y);
    }
  }
}

// ---- Connections (metro lines) ----
function drawConnections() {
  for (const line of state.lines) {
    const ids   = line.stationIds;
    const color = LINE_COLORS.find(c => c.id === line.colorId)?.hex || '#888';
    if (ids.length < 2) continue;

    const loop = isLoop(line);

    // Draw line segments
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth   = Math.max(2, 4 / state.zoom);
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';

    if (line.dots && line.dots.length >= 2) {
      // Draw with rounded bends using the committed freehand geometry.
      drawRoundedPolyline(line.dots, GRID_SPACING * 0.45);
    } else {
      // Fallback: straight segments between stations (loops & complex topologies)
      ctx.beginPath();
      const first = getStation(ids[0]);
      if (first) ctx.moveTo(first.x, first.y);
      for (let i = 1; i < ids.length; i++) {
        const s = getStation(ids[i]);
        if (s) ctx.lineTo(s.x, s.y);
      }
      if (loop && first) ctx.lineTo(first.x, first.y);
    }

    ctx.stroke();
    ctx.restore();
  }
}

// ---- Ghost dot preview when placing a station ----
function drawStationPreview() {
  if (state.tool !== 'station' || !state.previewPt) return;
  const g = snapToGrid(state.previewPt.x, state.previewPt.y);
  const occupied = findNearestStation(g.x, g.y, 2);

  ctx.save();
  ctx.globalAlpha = 0.65;
  ctx.beginPath();
  ctx.arc(g.x, g.y, STATION_R, 0, Math.PI * 2);
  // Orange ring if a station already sits on this dot, otherwise white dashed ring
  ctx.strokeStyle = occupied ? '#f39c12' : '#333';
  ctx.fillStyle   = occupied ? 'rgba(243,156,18,0.15)' : 'rgba(255,255,255,0.5)';
  ctx.lineWidth   = 2 / state.zoom;
  ctx.setLineDash([4 / state.zoom, 3 / state.zoom]);
  ctx.fill();
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ---- Freehand line preview ----
function drawPreviewLine() {
  if (state.tool !== 'connection') return;

  const color = getActiveColor().hex;

  // While actively drawing — show raw stroke + snapped overlay
  if (state.isDrawingLine && state.freehandPoints.length > 1) {
    // 1. Faint raw freehand stroke (marker feel)
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth   = Math.max(3, 6 / state.zoom);
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
    ctx.globalAlpha = 0.18;
    ctx.beginPath();
    ctx.moveTo(state.freehandPoints[0].x, state.freehandPoints[0].y);
    for (let i = 1; i < state.freehandPoints.length; i++) {
      ctx.lineTo(state.freehandPoints[i].x, state.freehandPoints[i].y);
    }
    ctx.stroke();
    ctx.restore();

    // 2. Bold freehand path with rounded corners
    const dots = state.freehandDots;
    if (dots.length >= 2) {
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth   = Math.max(2, 4 / state.zoom);
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      ctx.globalAlpha = 0.75;
      drawRoundedPolyline(dots, GRID_SPACING * 0.45);
      ctx.stroke();
      ctx.restore();

      // 3. Endpoint markers
      ctx.save();
      ctx.globalAlpha = 0.9;
      for (let i = 0; i < dots.length; i++) {
        if (i !== 0 && i !== dots.length - 1) continue;
        const d = dots[i];
        ctx.beginPath();
        ctx.arc(d.x, d.y, STATION_R, 0, Math.PI * 2);
        ctx.fillStyle   = '#fff';
        ctx.strokeStyle = color;
        ctx.lineWidth   = Math.max(1.5, 2.5 / state.zoom);
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    }
  }
}

// ---- Stations ----
function drawStations() {
  // Build name-collision map
  const nameCounts = {};
  for (const s of state.stations) {
    nameCounts[s.name] = (nameCounts[s.name] || 0) + 1;
  }

  for (const station of state.stations) {
    const isInterchange = getStationColorCount(station) >= 2;
    const r = isInterchange ? INTERCHANGE_R : STATION_R;
    const isSelected = state.selectedId?.type === 'station' && state.selectedId?.id === station.id;
    const isDuplicate = nameCounts[station.name] > 1;

    ctx.save();

    if (station.closed) {
      ctx.globalAlpha = 0.45;
    }

    // Station circle
    ctx.beginPath();
    ctx.arc(station.x, station.y, r, 0, Math.PI * 2);

    if (isInterchange) {
      ctx.fillStyle   = station.closed ? '#aaa' : '#fff';
      ctx.strokeStyle = station.closed ? '#888' : '#222';
      ctx.lineWidth   = Math.max(1.5, 2.5 / state.zoom);
      ctx.fill();
      ctx.stroke();
    } else {
      // Single-line station: fill with line color
      const lineId = [...station.lineIds][0];
      const line   = lineId ? getLine(lineId) : null;
      const color  = line ? (LINE_COLORS.find(c => c.id === line.colorId)?.hex || '#888') : '#888';
      ctx.fillStyle = station.closed ? '#aaa' : color;
      ctx.fill();
      // white outline
      ctx.strokeStyle = '#fff';
      ctx.lineWidth   = Math.max(1, 2 / state.zoom);
      ctx.stroke();
    }

    // Selection ring
    if (isSelected) {
      ctx.beginPath();
      ctx.arc(station.x, station.y, r + 4, 0, Math.PI * 2);
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth   = 2 / state.zoom;
      ctx.stroke();
    }

    // Closed X marker
    if (station.closed) {
      const d = r * 0.55;
      ctx.strokeStyle = '#c0392b';
      ctx.lineWidth   = Math.max(1.2, 2 / state.zoom);
      ctx.beginPath();
      ctx.moveTo(station.x - d, station.y - d);
      ctx.lineTo(station.x + d, station.y + d);
      ctx.moveTo(station.x + d, station.y - d);
      ctx.lineTo(station.x - d, station.y + d);
      ctx.stroke();
    }

    ctx.restore();

    // Station name label
    drawStationLabel(station, r, isDuplicate);
  }
}

function drawStationLabel(station, r, isDuplicate) {
  ctx.save();
  const fontSize = Math.max(9, 11 / state.zoom);
  ctx.font        = `${station.closed ? '300' : '500'} ${fontSize}px Inter, sans-serif`;
  ctx.textAlign   = 'center';
  ctx.textBaseline = 'top';

  // Offset label below station
  const lx = station.x;
  const ly = station.y + r + 3 / state.zoom;

  // Background for label
  const text   = station.name + (isDuplicate ? ' ⚠' : '');
  const metrics = ctx.measureText(text);
  const tw      = metrics.width + 4 / state.zoom;
  const th      = fontSize + 3 / state.zoom;

  ctx.fillStyle   = 'rgba(248,248,248,0.85)';
  ctx.fillRect(lx - tw / 2, ly - 1 / state.zoom, tw, th);

  ctx.fillStyle = isDuplicate ? '#e67e22' : (station.closed ? '#999' : '#222');
  ctx.fillText(text, lx, ly);
  ctx.restore();
}

// ---- Trains ----
function drawTrains() {
  for (const line of state.lines) {
    const color = LINE_COLORS.find(c => c.id === line.colorId)?.hex || '#888';
    for (const train of line.trains) {
      const pos = getTrainPosition(train);
      if (!pos) continue;

      ctx.save();
      ctx.translate(pos.x, pos.y);
      ctx.rotate(pos.ang);

      const tw = TRAIN_W / state.zoom;
      const th = TRAIN_H / state.zoom;

      // Shadow
      ctx.shadowColor   = 'rgba(0,0,0,0.25)';
      ctx.shadowBlur    = 3 / state.zoom;
      ctx.shadowOffsetY = 1 / state.zoom;

      // Body
      ctx.fillStyle = color;
      roundRect(ctx, -tw / 2, -th / 2, tw, th, Math.max(1, 2 / state.zoom));
      ctx.fill();

      // Outline
      ctx.shadowColor = 'transparent';
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      ctx.lineWidth   = Math.max(0.8, 1.2 / state.zoom);
      roundRect(ctx, -tw / 2, -th / 2, tw, th, Math.max(1, 2 / state.zoom));
      ctx.stroke();

      // Direction arrow
      const arrowSize = th * 0.35;
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath();
      ctx.moveTo(tw * 0.28, 0);
      ctx.lineTo(tw * 0.28 - arrowSize, -arrowSize * 0.7);
      ctx.lineTo(tw * 0.28 - arrowSize, arrowSize * 0.7);
      ctx.closePath();
      ctx.fill();

      // Train label (number)
      if (train.label) {
        ctx.fillStyle    = 'rgba(255,255,255,0.95)';
        ctx.font         = `bold ${Math.max(5, 7 / state.zoom)}px Inter, sans-serif`;
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(train.label, -tw * 0.12, 0);
      }

      ctx.restore();
    }
  }
}

/** Helper: draw a rounded rectangle path. */
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// =====================================================================
// EVENT HANDLING
// =====================================================================
let mouseScreenX = 0, mouseScreenY = 0;

canvas.addEventListener('mousemove', onMouseMove);
canvas.addEventListener('mousedown', onMouseDown);
canvas.addEventListener('mouseup',   onMouseUp);
canvas.addEventListener('dblclick',  onDblClick);
canvas.addEventListener('wheel',     onWheel, { passive: false });
canvas.addEventListener('contextmenu', e => e.preventDefault());

function getWorldPos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx   = e.clientX - rect.left;
  const sy   = e.clientY - rect.top;
  return screenToWorld(sx, sy);
}
function getScreenPos(e) {
  const rect = canvas.getBoundingClientRect();
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function onMouseMove(e) {
  const sp = getScreenPos(e);
  mouseScreenX = sp.x; mouseScreenY = sp.y;
  const wp = getWorldPos(e);

  // Update status bar coords
  document.getElementById('status-coords').textContent =
    `X: ${Math.round(wp.x)}  Y: ${Math.round(wp.y)}`;

  // Pan
  if (state.isPanning) {
    state.panX = state.panStartPanX + (sp.x - state.panStartX);
    state.panY = state.panStartPanY + (sp.y - state.panStartY);
    return;
  }

  // Drag station (select tool)
  if (state.dragging) {
    const st = getStation(state.dragging.stationId);
    if (st) {
      st.x = wp.x + state.dragging.dx;
      st.y = wp.y + state.dragging.dy;
    }
    return;
  }

  // Freehand line drawing — sample points and rebuild snapped dot sequence
  if (state.isDrawingLine) {
    state.freehandPoints.push(wp);
    state.freehandDots = buildDotSequence(state.freehandPoints);
    return;
  }

  // Station/general hover preview
  state.previewPt = wp;
}

function onMouseDown(e) {
  const sp = getScreenPos(e);
  const wp = getWorldPos(e);

  // Middle mouse / right mouse = pan
  if (e.button === 1 || (e.button === 2)) {
    state.isPanning   = true;
    state.panStartX   = sp.x;
    state.panStartY   = sp.y;
    state.panStartPanX = state.panX;
    state.panStartPanY = state.panY;
    canvas.classList.add('panning');
    return;
  }

  // Alt+drag = pan
  if (e.altKey) {
    state.isPanning    = true;
    state.panStartX    = sp.x;
    state.panStartY    = sp.y;
    state.panStartPanX = state.panX;
    state.panStartPanY = state.panY;
    canvas.classList.add('panning');
    return;
  }

  if (e.button !== 0) return;

  const { tool } = state;

  if (tool === 'select') {
    // Try to pick a station
    const st = findNearestStation(wp.x, wp.y, (STATION_R + 6) / state.zoom);
    if (st) {
      state.selectedId = { type: 'station', id: st.id };
      state.dragging   = { stationId: st.id, dx: st.x - wp.x, dy: st.y - wp.y };
      updateSidebar();
    } else {
      // Try to pick a line (click near a segment)
      const line = findLineNearPoint(wp.x, wp.y, 8 / state.zoom);
      if (line) {
        state.selectedId = { type: 'line', id: line.id };
        showLineNameInput(line);
        updateSidebar();
      } else {
        state.selectedId = null;
        document.getElementById('line-name-input').style.display = 'none';
        updateSidebar();
      }
    }
    return;
  }

  if (tool === 'station') {
    const st = addStation(wp.x, wp.y);

    // If placed on top of a line, insert the station into that line path.
    attachStationToNearbyLines(st, st.x, st.y, (STATION_R + 10) / state.zoom);

    state.selectedId = { type: 'station', id: st.id };
    updateSidebar();
    scheduleSave();
    return;
  }

  if (tool === 'connection') {
    // Start freehand stroke
    state.isDrawingLine  = true;
    state.freehandPoints = [wp];
    state.freehandDots   = buildDotSequence([wp]);
    state.previewPt      = null;
    return;
  }

  if (tool === 'close-station') {
    const st = findNearestStation(wp.x, wp.y, (STATION_R + 6) / state.zoom);
    if (st) {
      st.closed = !st.closed;
      updateSidebar();
      scheduleSave();
    }
    return;
  }

}

function onMouseUp(e) {
  if (state.isPanning) {
    state.isPanning = false;
    canvas.classList.remove('panning');
    scheduleSave();
  }
  if (state.dragging) {
    state.dragging = null;
    scheduleSave();
  }
  // Commit freehand line stroke
  if (state.isDrawingLine) {
    state.isDrawingLine = false;
    commitFreehandLine(state.freehandDots);
    state.freehandPoints = [];
    state.freehandDots   = [];
  }
}

function onDblClick(e) {
  const wp = getWorldPos(e);

  // Double-click on station to rename
  if (state.tool === 'select') {
    const st = findNearestStation(wp.x, wp.y, (STATION_R + 8) / state.zoom);
    if (st) {
      startInlineEdit(st, mouseScreenX, mouseScreenY);
      return;
    }
    // Double-click on line
    const line = findLineNearPoint(wp.x, wp.y, 8 / state.zoom);
    if (line) {
      const newName = prompt('Line name:', line.name);
      if (newName !== null) { line.name = newName.trim() || line.name; updateSidebar(); }
      return;
    }
  }
}

function onWheel(e) {
  e.preventDefault();
  const sp     = getScreenPos(e);
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const newZoom = Math.max(0.15, Math.min(8, state.zoom * factor));

  // Zoom toward cursor
  state.panX = sp.x - (sp.x - state.panX) * (newZoom / state.zoom);
  state.panY = sp.y - (sp.y - state.panY) * (newZoom / state.zoom);
  state.zoom = newZoom;

  document.getElementById('status-zoom').textContent =
    'Zoom: ' + Math.round(state.zoom * 100) + '%';
  scheduleSave();
}

// ---- Commit freehand stroke to actual stations + connections ----
function getStationsCrossedByDots(dots, threshold, endpointIds) {
  if (!dots || dots.length < 2) return [];

  const hits = [];
  for (const st of state.stations) {
    if (endpointIds?.has(st.id)) continue;

    let bestDist = Infinity;
    let bestPos = Infinity;
    let walked = 0;

    for (let i = 0; i < dots.length - 1; i++) {
      const a = dots[i];
      const b = dots[i + 1];
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const segLen2 = dx * dx + dy * dy;
      const segLen = Math.hypot(dx, dy);
      if (segLen < 0.001) continue;

      const t = Math.max(0, Math.min(1, ((st.x - a.x) * dx + (st.y - a.y) * dy) / segLen2));
      const cx = a.x + t * dx;
      const cy = a.y + t * dy;
      const dist = Math.hypot(st.x - cx, st.y - cy);

      if (dist < bestDist) {
        bestDist = dist;
        bestPos = walked + t * segLen;
      }

      walked += segLen;
    }

    if (bestDist <= threshold) {
      hits.push({ station: st, pos: bestPos });
    }
  }

  hits.sort((a, b) => a.pos - b.pos);
  return hits.map(h => h.station);
}

function commitFreehandLine(dots) {
  if (dots.length < 2) return;
  const line = getOrCreateActiveLine();

  // Endpoints are always stations. Any existing stations crossed by the path
  // are inserted in travel order so interchanges are created reliably.
  const startDot = dots[0];
  const endDot = dots[dots.length - 1];
  const endpointSnap = (SNAP_DIST + STATION_R + 8) / state.zoom;
  const startStation = findNearestStation(startDot.x, startDot.y, endpointSnap) || addStation(startDot.x, startDot.y);
  const endStation = findNearestStation(endDot.x, endDot.y, endpointSnap) || addStation(endDot.x, endDot.y);

  const endpointIds = new Set([startStation.id, endStation.id]);
  const crossedStations = getStationsCrossedByDots(dots, (STATION_R + 10) / state.zoom, endpointIds);
  const keyStations = [startStation, ...crossedStations, endStation];

  // Deduplicate consecutive identical stations
  const unique = [keyStations[0]];
  for (let i = 1; i < keyStations.length; i++) {
    if (keyStations[i].id !== unique[unique.length - 1].id) unique.push(keyStations[i]);
  }
  if (unique.length < 2) return;

  // Ensure each committed station also links to any overlapping line of a
  // overlapping line, regardless of draw order or line colour.
  for (const st of unique) {
    attachStationToNearbyLines(st, st.x, st.y, (STATION_R + 14) / state.zoom);
  }

  // Anchor path endpoints to station centers so line and stations join perfectly.
  dots[0] = { x: unique[0].x, y: unique[0].y };
  dots[dots.length - 1] = { x: unique[unique.length - 1].x, y: unique[unique.length - 1].y };

  // Build the ordered station list on this line
  const ids = line.stationIds;
  if (ids.length === 0) {
    // Fresh line — add all stations
    for (const st of unique) {
      ids.push(st.id);
      st.lineIds.add(line.id);
    }
    spawnInitialTrain(line);
    // Store the full dot path for smooth rendering
    line.dots = dots.map(d => ({ x: d.x, y: d.y }));
  } else {
    // Extend or merge: try to graft new stations onto an existing terminus
    const headSt = getStation(ids[0]);
    const tailSt = getStation(ids[ids.length - 1]);

    const matchHead  = unique.findIndex(s => s.id === headSt?.id);
    const matchTail  = unique.findIndex(s => s.id === tailSt?.id);
    const strokeTouchesBothTermini = (matchHead !== -1 && matchTail !== -1);

    if (matchTail !== -1) {
      // New stroke starts (or passes through) the tail — append new stations after it
      const oldLastSegIdx = ids.length - 2; // last segment before extension
      const toAdd = unique.slice(matchTail + 1);
      for (const st of toAdd) { ids.push(st.id); st.lineIds.add(line.id); }

      if (toAdd.length === 0 && strokeTouchesBothTermini) {
        // User redrew the same end-to-end connection; keep the new shape.
        line.dots = dots.map(d => ({ x: d.x, y: d.y }));
      }

      // Any train that had already reversed at the old tail terminus should be
      // flipped forward so it continues toward the new terminus instead of going backward.
      if (toAdd.length > 0) {
        for (const train of line.trains) {
          if (train.direction === -1 && train.segIdx === oldLastSegIdx) {
            train.direction = 1;
            train.segIdx    = oldLastSegIdx + 1;
            train.progress  = 0;
            train.state     = 'moving';
          }
        }
        // Extend the stored dot path from where the tail station appears in the new stroke
        if (line.dots && line.dots.length >= 2) {
          const tx = tailSt.x, ty = tailSt.y;
          const dSplit = dots.findIndex(d => d.x === tx && d.y === ty);
          if (dSplit !== -1 && dSplit < dots.length - 1) {
            line.dots = [...line.dots, ...dots.slice(dSplit + 1).map(d => ({ x: d.x, y: d.y }))];
          }
        }
      }
    } else if (matchHead !== -1) {
      // New stroke starts (or passes through) the head — prepend new stations before it
      const toAdd = unique.slice(0, matchHead).reverse();
      const numPrepended = toAdd.length;
      for (const st of toAdd) { ids.unshift(st.id); st.lineIds.add(line.id); }

      if (numPrepended === 0 && strokeTouchesBothTermini) {
        // User redrew the same end-to-end connection; keep the new shape.
        line.dots = dots.map(d => ({ x: d.x, y: d.y }));
      }

      // Prepending shifts every segment index by numPrepended — fix all trains.
      if (numPrepended > 0) {
        for (const train of line.trains) {
          train.segIdx += numPrepended;
        }
        // Prepend the stored dot path from the new stroke up to where head appears
        if (line.dots && line.dots.length >= 2) {
          const hx = headSt.x, hy = headSt.y;
          const dSplit = dots.findIndex(d => d.x === hx && d.y === hy);
          if (dSplit > 0) {
            line.dots = [...dots.slice(0, dSplit).map(d => ({ x: d.x, y: d.y })), ...line.dots];
          }
        }
      }
    } else {
      // No overlap with this line's termini.
      // Start a new line instead of appending disconnected stations,
      // which can make tracks appear missing while trains move off-screen.
      const color = getActiveColor();
      const newLine = {
        id:         lid(),
        name:       color.name + ' Line',
        colorId:    state.activeColorId,
        stationIds: [],
        trains:     [],
        dots:       dots.map(d => ({ x: d.x, y: d.y })),
      };
      state.lines.push(newLine);
      for (const st of unique) {
        newLine.stationIds.push(st.id);
        st.lineIds.add(newLine.id);
      }
      spawnInitialTrain(newLine);
      NumberTrains(newLine);
      state.selectedId = { type: 'line', id: newLine.id };
      showLineNameInput(newLine);
      updateSidebar();
      scheduleSave();
      return;
    }
  }

  // Ensure special route topologies are canonicalized for freehand-created shapes.
  normalizeSpecialTopologies(line);

  NumberTrains(line);
  mergeConnectedSameColorLines();
  state.selectedId = { type: 'line', id: line.id };
  showLineNameInput(line);
  updateSidebar();
  scheduleSave();
}

// ---- Find a line close to a world point ----
function findLineNearPoint(wx, wy, threshold) {
  for (const line of state.lines) {
    const ids = line.stationIds;
    for (let i = 0; i < ids.length - 1; i++) {
      const a = getStation(ids[i]);
      const b = getStation(ids[i + 1]);
      if (!a || !b) continue;
      const dist = pointSegmentDist(wx, wy, a.x, a.y, b.x, b.y);
      if (dist < threshold) return line;
    }
  }
  return null;
}

function getNearestLineSegment(line, wx, wy) {
  const nearest = {
    dist: Infinity,
    stationSegIdx: -1,
    dotSegIdx: -1,
  };

  const ids = line.stationIds;
  for (let i = 0; i < ids.length - 1; i++) {
    const a = getStation(ids[i]);
    const b = getStation(ids[i + 1]);
    if (!a || !b) continue;
    const d = pointSegmentDist(wx, wy, a.x, a.y, b.x, b.y);
    if (d < nearest.dist) {
      nearest.dist = d;
      nearest.stationSegIdx = i;
    }
  }

  if (line.dots && line.dots.length >= 2) {
    for (let i = 0; i < line.dots.length - 1; i++) {
      const a = line.dots[i];
      const b = line.dots[i + 1];
      const d = pointSegmentDist(wx, wy, a.x, a.y, b.x, b.y);
      if (d < nearest.dist) {
        nearest.dist = d;
        nearest.dotSegIdx = i;
      }
    }
  }

  return nearest;
}

function insertStationIntoLine(line, station, stationSegIdx, dotSegIdx) {
  if (!line || !station || line.stationIds.length < 2) return false;

  if (line.stationIds.includes(station.id)) {
    station.lineIds.add(line.id);
    return false;
  }

  const insertAt = Math.max(1, Math.min(line.stationIds.length - 1, stationSegIdx + 1));
  line.stationIds.splice(insertAt, 0, station.id);
  station.lineIds.add(line.id);

  if (line.dots && line.dots.length >= 2 && dotSegIdx >= 0) {
    const prev = line.dots[dotSegIdx];
    const next = line.dots[dotSegIdx + 1];
    const sameAsPrev = prev && prev.x === station.x && prev.y === station.y;
    const sameAsNext = next && next.x === station.x && next.y === station.y;
    if (!sameAsPrev && !sameAsNext) {
      line.dots.splice(dotSegIdx + 1, 0, { x: station.x, y: station.y });
    }
  }

  for (const train of line.trains) {
    if (train.segIdx >= insertAt) {
      train.segIdx += 1;
    }
  }

  return true;
}

/** Insert a station into any nearby line segment (including same-colour lines). */
function attachStationToNearbyLines(station, wx, wy, threshold) {
  let changed = false;
  for (const line of state.lines) {
    if (!line || line.stationIds.length < 2) continue;
    if (station.lineIds.has(line.id)) continue;

    const hit = getNearestLineSegment(line, wx, wy);
    if (hit.dist <= threshold && hit.stationSegIdx !== -1) {
      const inserted = insertStationIntoLine(line, station, hit.stationSegIdx, hit.dotSegIdx);
      if (!inserted) station.lineIds.add(line.id);
      changed = true;
    }
  }

  return changed;
}

function pointSegmentDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  if (dx === 0 && dy === 0) return Math.hypot(px - ax, py - ay);
  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / (dx * dx + dy * dy)));
  return Math.hypot(px - ax - t * dx, py - ay - t * dy);
}

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  const k = e.key.toLowerCase();
  if (k === 'v') setTool('select');
  if (k === 's') setTool('station');
  if (k === 'l') setTool('connection');
  if (k === 'c') setTool('close-station');
  if (k === 't') addTrainToSelectedLine();
  if (k === 'escape') {
    setTool('select'); // resets all drawing state
  }
  if (k === 'delete' || k === 'backspace') {
    deleteSelected();
  }
});

function deleteSelected() {
  const sel = state.selectedId;
  if (!sel) return;
  if (sel.type === 'station') {
    const idx = state.stations.findIndex(s => s.id === sel.id);
    if (idx !== -1) {
      const st = state.stations[idx];
      // Remove station from all lines. If the station is a terminus, trim
      // line geometry to the previous station so no dangling segment remains.
      for (let li = state.lines.length - 1; li >= 0; li--) {
        const line = state.lines[li];
        let removedFromLine = false;

        while (true) {
          const pos = line.stationIds.indexOf(st.id);
          if (pos === -1) break;
          removedFromLine = true;

          const wasFirst = pos === 0;
          const wasLast = pos === line.stationIds.length - 1;
          line.stationIds.splice(pos, 1);

          if (line.dots && line.dots.length >= 2) {
            if (wasFirst && line.stationIds.length > 0) {
              const newFirst = getStation(line.stationIds[0]);
              if (newFirst) {
                const cut = line.dots.findIndex(d => d.x === newFirst.x && d.y === newFirst.y);
                if (cut > 0) line.dots = line.dots.slice(cut);
              }
            } else if (wasLast && line.stationIds.length > 0) {
              const newLast = getStation(line.stationIds[line.stationIds.length - 1]);
              if (newLast) {
                let cut = -1;
                for (let di = line.dots.length - 1; di >= 0; di--) {
                  const d = line.dots[di];
                  if (d.x === newLast.x && d.y === newLast.y) { cut = di; break; }
                }
                if (cut !== -1 && cut < line.dots.length - 1) {
                  line.dots = line.dots.slice(0, cut + 1);
                }
              }
            } else {
              // Middle deletions can invalidate precomputed smooth-dot paths.
              line.dots = null;
            }
          }
        }

        if (!removedFromLine) continue;

        if (line.stationIds.length < 2) {
          // Line is no longer valid, remove it and clean station memberships.
          for (const sid of line.stationIds) {
            const s = getStation(sid);
            if (s) s.lineIds.delete(line.id);
          }
          state.lines.splice(li, 1);
          continue;
        }

        // Keep train state valid after topology changes.
        line.trains = [];
        spawnInitialTrain(line);
        NumberTrains(line);
      }
      state.stations.splice(idx, 1);
    }
  } else if (sel.type === 'line') {
    const idx = state.lines.findIndex(l => l.id === sel.id);
    if (idx !== -1) {
      const line = state.lines[idx];
      // Clean up station lineIds
      for (const sid of line.stationIds) {
        const st = getStation(sid);
        if (st) st.lineIds.delete(line.id);
      }
      state.lines.splice(idx, 1);
    }
  }
  state.selectedId = null;
  updateSidebar();
  scheduleSave();
}

let activeEditor = null;

function startInlineEdit(station, sx, sy) {
  if (activeEditor) activeEditor.remove();

  const input    = document.createElement('input');
  input.type     = 'text';
  input.value    = station.name;
  input.className = 'inline-editor';
  input.style.left = (sx + 10) + 'px';
  input.style.top  = (sy - 14) + 'px';
  document.body.appendChild(input);
  activeEditor = input;
  input.focus();
  input.select();

  const finish = () => {
    const v = input.value.trim();
    if (v) station.name = v;
    input.remove();
    activeEditor = null;
    updateSidebar();
    scheduleSave();
  };
  input.addEventListener('blur',  finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') finish();
    if (e.key === 'Escape') { input.remove(); activeEditor = null; }
  });
}

  // Sync the line name input to the currently selected line,

  const inp = document.getElementById('line-name-input');

function updateSidebarLines() {
  const container = document.getElementById('sidebar-lines');
  container.innerHTML = '';

  if (state.lines.length === 0) {
    container.innerHTML = '<div style="color:#555;font-size:11px;padding:8px;">No lines yet. Select the Line tool, choose a colour, and click two stations to connect them.</div>';
    return;
  }

  for (const line of state.lines) {
    const color    = LINE_COLORS.find(c => c.id === line.colorId)?.hex || '#888';
    const isSelected = state.selectedId?.type === 'line' && state.selectedId?.id === line.id;

    const div = document.createElement('div');
    div.className = 'sidebar-item' + (isSelected ? ' selected' : '');
    div.innerHTML = `
      <span class="item-dot" style="background:${color}"></span>
      <span class="item-name">${escHtml(line.name)}</span>
      <span class="item-meta" title="${line.trains.length} train(s)">🚆 ${line.trains.length}</span>
    `;
    div.addEventListener('click', () => {
      state.selectedId = { type: 'line', id: line.id };
      updateSidebar();
    });
    container.appendChild(div);

    // Show stations on this line compactly
    if (line.stationIds.length > 0) {
      const stDiv = document.createElement('div');
      stDiv.style.cssText = 'padding:2px 6px 6px 24px;font-size:10px;color:#6c7a9c;';
      stDiv.textContent = line.stationIds.map(id => getStation(id)?.name || '?').join(' → ');
      container.appendChild(stDiv);
    }
  }
}

function updateSidebarStations() {
  const container = document.getElementById('sidebar-stations');
  container.innerHTML = '';

  if (state.stations.length === 0) {
    container.innerHTML = '<div style="color:#555;font-size:11px;padding:8px;">No stations yet. Select the Station tool and click on the canvas.</div>';
    return;
  }

  // Detect duplicate names
  const nameCounts = {};
  for (const s of state.stations) {
    nameCounts[s.name] = (nameCounts[s.name] || 0) + 1;
  }

  for (const st of state.stations) {
    const isSelected = state.selectedId?.type === 'station' && state.selectedId?.id === st.id;
    const isDuplicate = nameCounts[st.name] > 1;

    const div = document.createElement('div');
    div.className = 'sidebar-item' + (isSelected ? ' selected' : '');

    // Get line color for dot (first line)
    const lineId  = [...st.lineIds][0];
    const line    = lineId ? getLine(lineId) : null;
    const color   = line ? (LINE_COLORS.find(c => c.id === line.colorId)?.hex || '#888') : '#888';
    const dotStyle = getStationColorCount(st) >= 2
      ? 'border:2px solid #444;background:#fff'
      : `background:${color}`;

    div.innerHTML = `
      <span class="item-dot" style="${dotStyle}"></span>
      <span class="item-name">${escHtml(st.name)}${isDuplicate ? ' <span class="warn-badge">DUP</span>' : ''}</span>
      <span class="item-status ${st.closed ? 'closed' : 'open'}">${st.closed ? 'Closed' : 'Open'}</span>
    `;
    div.addEventListener('click', () => {
      state.selectedId = { type: 'station', id: st.id };
      updateSidebar();
    });
    div.addEventListener('dblclick', e => {
      startInlineEdit(st, e.clientX, e.clientY);
    });
    container.appendChild(div);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =====================================================================
// PERSISTENCE
// =====================================================================
// Auto-save on changes (debounced)
let saveTimeout;
function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => saveState(), 500);
}

function makeStateSnapshot() {
  return {
    stations: state.stations.map(s => ({
      ...s,
      lineIds: Array.from(s.lineIds),
    })),
    lines: state.lines.map(l => ({
      ...l,
      trains: l.trains.map(t => ({ ...t })),
    })),
    nextStationId: state.nextStationId,
    nextLineId: state.nextLineId,
    nextTrainId: state.nextTrainId,
    namePoolIndex: _namePoolIndex,
    panX: state.panX,
    panY: state.panY,
    zoom: state.zoom,
  };
}

function applyStateSnapshot(data) {
  state.stations = (data.stations || []).map(s => ({
    ...s,
    lineIds: new Set(s.lineIds || []),
  }));

  state.lines = (data.lines || []).map(l => ({
    ...l,
    trains: (l.trains || []).map(t => ({ ...t })),
    dots: Array.isArray(l.dots) ? l.dots.map(d => ({ x: d.x, y: d.y })) : null,
  }));

  state.nextStationId = data.nextStationId || 1;
  state.nextLineId = data.nextLineId || 1;
  state.nextTrainId = data.nextTrainId || 1;
  _namePoolIndex = data.namePoolIndex || 0;

  state.panX = Number.isFinite(data.panX) ? data.panX : 0;
  state.panY = Number.isFinite(data.panY) ? data.panY : 0;
  state.zoom = Number.isFinite(data.zoom) ? data.zoom : 1;

  state.selectedId = null;
  state.isDrawingLine = false;
  state.freehandPoints = [];
  state.freehandDots = [];
  state.dragging = null;
  state.isPanning = false;
}

function loadSaveIndex() {
  try {
    const raw = localStorage.getItem(SAVE_INDEX_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) {
    console.error('Failed to parse saves:', e);
    return [];
  }
}

function saveSaveIndex(entries) {
  try {
    localStorage.setItem(SAVE_INDEX_KEY, JSON.stringify(entries));
  } catch (e) {
    console.error('Failed to write saves:', e);
  }
}

function migrateLegacySaveIfNeeded() {
  const existing = loadSaveIndex();
  if (existing.length > 0) return;

  const legacyRaw = localStorage.getItem(LEGACY_SAVE_KEY);
  if (!legacyRaw) return;

  try {
    const legacyData = JSON.parse(legacyRaw);
    const now = Date.now();
    saveSaveIndex([{
      id: 'metro-' + now,
      name: 'My Metro',
      updatedAt: now,
      data: legacyData,
    }]);
  } catch (e) {
    console.error('Failed to migrate legacy save:', e);
  }
}

function initializeBlankMap() {
  state.stations = [];
  state.lines = [];
  state.selectedId = null;
  state.isDrawingLine = false;
  state.freehandPoints = [];
  state.freehandDots = [];
  state.previewPt = null;
  state.dragging = null;
  state.isPanning = false;
  state.nextStationId = 1;
  state.nextLineId = 1;
  state.nextTrainId = 1;
  _namePoolIndex = 0;
  resetView();
}

function saveState() {
  try {
    if (!activeSaveId) return;
    const entries = loadSaveIndex();
    const idx = entries.findIndex(e => e.id === activeSaveId);
    if (idx === -1) return;

    entries[idx] = {
      ...entries[idx],
      updatedAt: Date.now(),
      data: makeStateSnapshot(),
    };
    saveSaveIndex(entries);
  } catch (e) {
    console.error('Failed to save state:', e);
  }
}

function loadStateFromEntry(entry) {
  try {
    if (!entry?.data) return false;

    applyStateSnapshot(entry.data);

    // Re-apply topology normalization so saved figure-eights and lollipops
    // always use the correct canonical station order regardless of when they
    // were saved.
    for (const line of state.lines) {
      normalizeSpecialTopologies(line);
    }

    activeSaveId = entry.id;
    return true;
  } catch (e) {
    console.error('Failed to load state:', e);
    return false;
  }
}

function setupSplashScreen() {
  const splash = document.getElementById('splash-screen');
  if (!splash) return;

  let dismissed = false;
  let dismissTimer = null;

  function closeSplash() {
    if (dismissed) return;
    dismissed = true;
    splash.classList.add('hidden');
    window.dispatchEvent(new Event('metro:splash-closed'));
    setTimeout(() => {
      splash.remove();
    }, 750);
    window.removeEventListener('keydown', closeSplash);
  }

  dismissTimer = setTimeout(closeSplash, 2000);

  splash.addEventListener('click', closeSplash);
  window.addEventListener('keydown', closeSplash, { once: true });

  const gif = splash.querySelector('img');
  gif?.addEventListener('error', () => {
    clearTimeout(dismissTimer);
    closeSplash();
  }, { once: true });
}

function formatSaveTime(ts) {
  if (!ts) return 'Unknown date';
  const d = new Date(ts);
  if (Number.isNaN(d.getTime())) return 'Unknown date';
  return d.toLocaleString();
}

function hideStartMenu() {
  const menu = document.getElementById('start-menu');
  if (!menu) return;
  menu.classList.add('hidden');
}

function enterMetro() {
  setTool('select');
  updateSidebar();
  document.getElementById('status-zoom').textContent = `Zoom: ${Math.round(state.zoom * 100)}%`;
}

function playTransitionSplash(onDone, loadingLabel) {
  const existing = document.getElementById('transition-splash');
  if (existing) existing.remove();

  const safeLabel = escHtml((loadingLabel || 'Loading metro...').slice(0, 80));

  const splash = document.createElement('div');
  splash.id = 'transition-splash';
  splash.setAttribute('aria-label', 'Loading splash screen');
  splash.style.position = 'fixed';
  splash.style.inset = '0';
  splash.style.display = 'flex';
  splash.style.flexDirection = 'column';
  splash.style.gap = '12px';
  splash.style.alignItems = 'center';
  splash.style.justifyContent = 'center';
  splash.style.background = '#0b1020';
  splash.style.zIndex = '1001';
  splash.style.opacity = '1';
  splash.style.visibility = 'visible';
  splash.style.transition = 'opacity 0.6s ease, visibility 0.6s ease';
  splash.innerHTML = `
    <div style="color:#f2f4fb;font-size:clamp(24px, 4vw, 42px);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;text-shadow:0 8px 28px rgba(0,0,0,0.45)">Metro Designer</div>
    <div style="color:#b7c8ec;font-size:clamp(12px, 2vw, 18px);font-weight:500;letter-spacing:0.04em;text-transform:uppercase">${safeLabel}</div>
    <img src="intro.gif" alt="Metro Designer intro animation" style="width:min(88vw, 860px);max-height:82vh;object-fit:contain;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,0.5)">
    <div style="position:absolute;right:16px;bottom:14px;color:rgba(255,255,255,0.85);font-size:12px;letter-spacing:0.08em;text-transform:uppercase">Loading...</div>
  `;
  document.body.appendChild(splash);

  const done = () => {
    if (typeof onDone === 'function') onDone();
    splash.style.opacity = '0';
    splash.style.visibility = 'hidden';
    setTimeout(() => splash.remove(), 650);
  };

  const img = splash.querySelector('img');
  img?.addEventListener('error', done, { once: true });
  setTimeout(done, 1200);
}

function enterMetroWithSplash(loadFn, loadingLabel) {
  hideStartMenu();
  playTransitionSplash(() => {
    if (typeof loadFn === 'function') loadFn();
    enterMetro();
  }, loadingLabel);
}

function createNewMetroFromMenu() {
  const proposed = prompt(`Name your new metro (max ${SAVE_NAME_MAX_LEN} chars):`, 'New Metro');
  if (proposed === null) return;

  const name = (proposed.trim() || 'New Metro').slice(0, SAVE_NAME_MAX_LEN);
  const entries = loadSaveIndex();
  const now = Date.now();
  const id = 'metro-' + now;

  activeSaveId = id;
  initializeBlankMap();

  entries.unshift({
    id,
    name,
    updatedAt: now,
    data: makeStateSnapshot(),
  });
  saveSaveIndex(entries);

  enterMetroWithSplash(null, `Loading into ${name}`);
}

function startMenuLoadSave(saveId) {
  const entries = loadSaveIndex();
  const entry = entries.find(s => s.id === saveId);
  if (!entry) return;
  const name = (entry.name || 'Unnamed Metro').slice(0, SAVE_NAME_MAX_LEN);
  enterMetroWithSplash(() => {
    if (!loadStateFromEntry(entry)) {
      showTooltipMsg('Could not load this metro save.', 2000);
      showStartMenu();
    }
  }, `Loading into ${name}`);
}

function renameSaveFromMenu(saveId) {
  const entries = loadSaveIndex();
  const idx = entries.findIndex(s => s.id === saveId);
  if (idx === -1) return;

  const currentName = entries[idx].name || 'Unnamed Metro';
  const next = prompt(`Rename metro (max ${SAVE_NAME_MAX_LEN} chars):`, currentName);
  if (next === null) return;

  const clean = (next.trim() || currentName).slice(0, SAVE_NAME_MAX_LEN);
  entries[idx].name = clean;
  entries[idx].updatedAt = Date.now();
  saveSaveIndex(entries);
  renderStartMenuSaves();
}

function deleteSaveFromMenu(saveId) {
  const entries = loadSaveIndex();
  const idx = entries.findIndex(s => s.id === saveId);
  if (idx === -1) return;

  const name = entries[idx].name || 'Unnamed Metro';
  if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;

  entries.splice(idx, 1);
  if (activeSaveId === saveId) activeSaveId = null;
  saveSaveIndex(entries);
  renderStartMenuSaves();
}

function duplicateSaveFromMenu(saveId) {
  const entries = loadSaveIndex();
  const idx = entries.findIndex(s => s.id === saveId);
  if (idx === -1) return;

  const source = entries[idx];
  const now = Date.now();
  const id = 'metro-' + now;
  const baseName = source.name || 'Unnamed Metro';
  const dupName = `${baseName} Copy`.slice(0, SAVE_NAME_MAX_LEN);

  entries.unshift({
    id,
    name: dupName,
    updatedAt: now,
    // JSON clone keeps save format plain and detached from source reference.
    data: JSON.parse(JSON.stringify(source.data || {})),
  });

  saveSaveIndex(entries);
  renderStartMenuSaves();
}

function renderStartMenuSaves() {
  const saveList = document.getElementById('save-list');
  const empty = document.getElementById('save-empty');
  if (!saveList || !empty) return;

  const saves = loadSaveIndex().sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
  saveList.innerHTML = '';

  if (saves.length === 0) {
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  for (const s of saves) {
    const row = document.createElement('div');
    row.className = 'save-item';
    row.innerHTML = `
      <button class="save-item-main" type="button">
      <div class="save-name">${escHtml(s.name || 'Unnamed Metro')}</div>
      <div class="save-meta">Last updated: ${escHtml(formatSaveTime(s.updatedAt))}</div>
      </button>
      <div class="save-item-actions">
        <button class="save-mini-btn duplicate" type="button">Duplicate</button>
        <button class="save-mini-btn rename" type="button">Rename</button>
        <button class="save-mini-btn delete" type="button">Delete</button>
      </div>
    `;

    row.querySelector('.save-item-main')?.addEventListener('click', () => startMenuLoadSave(s.id));
    row.querySelector('.save-mini-btn.duplicate')?.addEventListener('click', () => duplicateSaveFromMenu(s.id));
    row.querySelector('.save-mini-btn.rename')?.addEventListener('click', () => renameSaveFromMenu(s.id));
    row.querySelector('.save-mini-btn.delete')?.addEventListener('click', () => deleteSaveFromMenu(s.id));
    saveList.appendChild(row);
  }
}

function showStartMenu() {
  migrateLegacySaveIfNeeded();
  renderStartMenuSaves();

  const menu = document.getElementById('start-menu');
  menu?.classList.remove('hidden');

  document.getElementById('btn-new-metro')?.addEventListener('click', createNewMetroFromMenu);
  document.getElementById('btn-refresh-saves')?.addEventListener('click', renderStartMenuSaves);
}

function returnToMenu() {
  saveState();
  showStartMenu();
}

// =====================================================================
// INIT
// =====================================================================
setupSplashScreen();

initializeBlankMap();
setTool('select');
updateSidebar();
document.getElementById('status-zoom').textContent = `Zoom: ${Math.round(state.zoom * 100)}%`;

window.addEventListener('metro:splash-closed', showStartMenu, { once: true });

// Save on page unload
window.addEventListener('beforeunload', () => saveState());

// Kick off render loop
requestAnimationFrame(render);
</script>
</body>
</html>
